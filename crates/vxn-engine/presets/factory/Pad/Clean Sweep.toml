schema = 1

[meta]
name = "Clean Sweep"
author = "Vulpus Labs"
category = "Pad"
comment = "Heavy sync-sweep pad — Env 1 drags the cross-mod sweep under hard sync for a slow, glassy formant motion. Raise the global Oversample for the cleanest sync."

[performance]
key_mode = "Whole"
split_point = 60

[performance.upper]
# osc1 = slave/carrier (audible sync sound); osc2 = master.
osc1_octave = 0
osc1_level = 0.6
osc2_wave = "Pulse"
osc2_pw = 0.35
cross_mod_type = "Sync"
pitch_env_src = "Env 1"
pitch_env_depth = 12.0
pitch_env_mod_only = true
env1_attack = 0.6
env1_decay = 2.5
cutoff = 5000.0
resonance = 0.2
env2_attack = 0.5
env2_decay = 1.5
env2_sustain = 0.7
env2_release = 1.4

schema = 1
kind = "performance"

[meta]
name = "Strings Attached"
author = "Vulpus Labs"
category = "Jovial Performances"
tags = ["jp8", "dual", "brass", "strings"]
comment = "The JP-8 orchestral layer — bright brass (Upper) stacked over unison strings (Lower) in Dual, so every note sounds both. The signature 'Jupiter' fanfare. Divergence: no chorus (a Juno trait); master trimmed for the stacked level."

[performance]
key_mode = "Dual"
split_point = 60

[performance.global]
master_volume = 0.6
chorus_on = false

[performance.upper]
osc2_octave = 0
osc2_fine = -4.0
osc2_level = 0.8
cutoff = 1100.0
resonance = 0.2
drive = 1.4
env1_decay = 0.25
env1_sustain = 0.2
cutoff_env_depth = 42.0
env2_attack = 0.01
env2_sustain = 0.75
env2_release = 0.25

[performance.lower]
osc2_octave = 0
osc2_fine = 9.0
osc2_level = 0.8
cutoff = 3000.0
resonance = 0.15
env2_attack = 0.5
env2_decay = 2.0
env2_sustain = 0.85
env2_release = 1.1
assign_mode = "Unison"
unison_detune = 16.0
pitch_lfo_depth = 0.18
lfo_rate = 4.5

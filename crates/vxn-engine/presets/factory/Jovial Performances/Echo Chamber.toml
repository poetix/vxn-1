schema = 1
kind = "performance"

[meta]
name = "Echo Chamber"
author = "Vulpus Labs"
category = "Jovial Performances"
tags = ["jp8", "keys", "fm", "delay"]
comment = "JP-8 'Echo Piano' — a tine-y FM electric piano with a slapback echo. The original faked the echo with envelope-mod trickery on release; VXN-1 uses the global delay, which a Patch can't carry, so this ships as a Whole Performance. Chorus off for authenticity."

[performance]
key_mode = "Whole"
split_point = 60

[performance.global]
chorus_on = false
delay_on = true
delay_time = 0.22
delay_feedback = 0.25
delay_mix = 0.35
delay_pingpong = false

[performance.upper]
osc1_wave = "Sine"
osc2_wave = "Sine"
osc2_octave = 0
osc2_fine = 0.0
osc2_level = 0.0
cross_mod_type = "FM"
cross_mod_amount = 1.0
cutoff = 7000.0
env2_attack = 0.002
env2_decay = 1.2
env2_sustain = 0.0
env2_release = 0.4

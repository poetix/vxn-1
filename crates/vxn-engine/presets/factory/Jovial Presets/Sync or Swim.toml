comment = "Surging 'negative envelope' sync lead (orig. 'Neg Sync') — sharp attack, the sync sweep diving downward via an inverted (negative) pitch-env depth. Divergence: negative depth replaces the JP-8 env-polarity switch; raise Oversample for clean sync."


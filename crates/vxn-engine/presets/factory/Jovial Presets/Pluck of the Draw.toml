schema = 1
kind = "patch"

[meta]
name = "Pluck of the Draw"
author = "Vulpus Labs"
category = "Jovial Presets"
tags = ["jp8", "pluck"]
comment = "Bright sweeping pluck with a sharp attack (orig. 'Neg Pluck') — a downward Env-1 chirp on osc 2 gives the 'negative envelope' sweep over a snappy filter bite. Divergence: negative pitch-env depth replaces the env-polarity switch."

[patch]
osc2_octave = 0
osc2_fine = 5.0
cutoff = 4000.0
resonance = 0.35
osc2_pitch_env_src = "Env 1"
osc2_pitch_env_depth = -24.0
env1_attack = 0.001
env1_decay = 0.18
cutoff_env_depth = 30.0
env2_attack = 0.002
env2_decay = 0.35
env2_sustain = 0.0
env2_release = 0.2

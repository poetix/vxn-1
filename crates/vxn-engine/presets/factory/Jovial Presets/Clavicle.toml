schema = 1
kind = "patch"

[meta]
name = "Clavicle"
author = "Vulpus Labs"
category = "Jovial Presets"
tags = ["jp8", "clav", "keys"]
comment = "Plucky clavinet-style key (orig. 'Clav') — a narrow pulse, key-tracked filter, fast Env-1 bite and short sustain. Divergence: no string-buzz physical model; the pluck is filter-env shaped."

[patch]
osc1_wave = "Pulse"
osc1_pw = 0.25
osc2_octave = 0
osc2_fine = 0.0
osc2_level = 0.3
cutoff = 1500.0
resonance = 0.35
filter_key_track = true
env1_decay = 0.25
cutoff_env_depth = 40.0
env2_decay = 0.5
env2_sustain = 0.1
env2_release = 0.15

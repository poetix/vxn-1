<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VXN1</title>
<style>
/* Faceplate scaffold (0040). Mirrors the vizia editor's geometry from
   `target/vxn-layout.jsonl`: 1024×772 logical, 10px outer padding, 8px
   vertical gap between banner / preset-bar / 4×156 rows, 6px horizontal
   gap between panels in a row. CSS vars are named after the vxn-ui Rust
   constants so the mapping stays obvious; pixel literals stay out of
   selectors so a future resize policy is one variable change. */
:root {
  /* Palette (matches vxn-ui-vizia's STYLE block). */
  --face-bg: #2b2b2b;
  --panel-bg: #1c1c1c;
  --panel-border: #0e0e0e;
  --panel-corner: 4px;
  --header-bg: #a7cfe2;
  --header-fg: #141414;
  --banner-fg: #a7cfe2;
  --text: #d6d6d6;
  --ctl-label: #aeaeae;
  --ctl-value: #d9701b;          /* orange readout — Vizia .ctl-value */
  --track-bg: #0e0e0e;
  --track-fill: #d9701b;
  --thumb-bg: #c4c4c4;
  --thumb-border: #a7cfe2;       /* matches --glyph-active / --knob-indicator */
  --glyph: #888888;
  --glyph-active: #a7cfe2;
  --knob-face: #2a2a2a;
  --knob-rim: #444444;
  --knob-dimple: #222222;
  --knob-dimple-rim: #333333;
  --knob-indicator: #a7cfe2;       /* matches --glyph-active */

  /* Geometry (matches vxn-ui-vizia's PANEL_H / FADER_H / COL_H / DIAL plus
     row + chrome heights derived from `target/vxn-layout.jsonl`). */
  --editor-w: 1024px;
  --pad-outer: 10px;
  --banner-h: 26px;
  --preset-bar-h: 30px;
  --panel-h: 156px;           /* PANEL_H */
  --col-h: 120px;             /* COL_H — per-control column inside a panel */
  --fader-h: 74px;            /* FADER_H — fader travel */
  --dial: 62px;               /* DIAL — selector-knob box */
  --panel-pad: 5px;
  --panel-vgap: 4px;
  --row-vgap: 8px;
  --row-hgap: 6px;
  --header-h: 16px;
  --header-toggle-slot: 16px; /* reserves the Chorus/Delay header switch (0045) */
  --ctl-label-h: 12px;
  --ctl-value-h: 12px;
  --ctl-gap: 2px;
  --fader-track-w: 4px;
  --thumb-w: 18px;
  --thumb-h: 8px;
  --wave-knob-size: 64px;     /* matches the prototype's "Compact" variant */
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--face-bg);
  color: var(--text);
  font-family: "IBM Plex Sans Condensed", -apple-system, system-ui, sans-serif;
  /* Disable text selection across the faceplate — knobs / faders behave more
     like physical controls than text. */
  user-select: none;
  -webkit-user-select: none;
}

.faceplate {
  width: var(--editor-w);
  box-sizing: border-box;
  padding: var(--pad-outer);
  display: flex;
  flex-direction: column;
  gap: var(--row-vgap);
}

.banner {
  height: var(--banner-h);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  color: var(--banner-fg);
  font-size: 16px;
  letter-spacing: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Empty slot. The vizia editor's preset bar overlays this during the
   E010 → E011 transition (0049 replaces it with the HTML preset bar). */
.preset-bar-slot {
  height: var(--preset-bar-h);
  background: transparent;
}

.row {
  display: flex;
  gap: var(--row-hgap);
  height: var(--panel-h);
}

.panel {
  position: relative;             /* anchor for absolutely-placed .panel-strip */
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  padding: var(--panel-pad);
  display: flex;
  flex-direction: column;
  gap: var(--panel-vgap);
  min-width: 0;
  flex: 1 1 0;
  box-sizing: border-box;
}

.panel[data-layered] {}

/* Per-row stretch shares — pulled from `panel_view`'s `match title` block
   in `crates/vxn-ui-vizia/src/lib.rs`. flex-basis is 0 so `flex-grow`
   gives a pure ratio. Bend is the only fixed-width panel. */
.row-1 .panel[data-name="LFO 1"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="LFO 2"]  { flex-grow: 0.7; }
.row-1 .panel[data-name="Osc 1"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="Osc 2"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="Mixer"]  { flex-grow: 1.1; }

.row-2 .panel[data-name="Env 1"]      { flex-grow: 0.8; }
.row-2 .panel[data-name="Env 2"]      { flex-grow: 0.8; }
.row-2 .panel[data-name="VCA"]        { flex-grow: 0.75; }
.row-2 .panel[data-name="Filter"]     { flex-grow: 1.15; }
.row-2 .panel[data-name="Filter Mod"] { flex-grow: 1.0; }

.row-3 .panel[data-name="Bend"] { flex: 0 0 54px; }

.panel-header {
  height: var(--header-h);
  background: var(--header-bg);
  color: var(--header-fg);
  border-radius: 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

.panel[data-header-toggle] .panel-header {
  justify-content: flex-start;
  padding-left: 3px;
  gap: 4px;
}
.panel[data-header-toggle] .panel-header-toggle-slot {
  width: var(--header-toggle-slot);
  height: var(--header-toggle-slot);
  flex: 0 0 var(--header-toggle-slot);
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel[data-header-toggle] .panel-header-title {
  flex: 1 1 auto;
  text-align: center;
  margin-right: var(--header-toggle-slot);
}

.panel-body {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  gap: 4px;
  align-items: stretch;
  justify-content: space-evenly;
}

/* ── Control primitives (0041) ──────────────────────────────────────────── */

/* Common cell — a vertical stack of label, control, value. */
.ctl {
  position: relative;          /* anchor for the absolute .ctl-value popup */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}

.ctl-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-label);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  height: var(--ctl-label-h);
  line-height: var(--ctl-label-h);
}

/* Floating value popup — one shared <div> across every control, anchored
   at the pointer's entry / grab point in fixed coords so it floats above
   the layout and can never push siblings around. Style matches the vizia
   editor's `.value-pop` (dark fill, orange border). */
.value-pop {
  position: fixed;
  display: none;
  pointer-events: none;
  background: #0e0e0e;
  border: 1px solid var(--ctl-value);
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 10px;
  color: #f6f6f6;
  white-space: nowrap;
  z-index: 1000;
}

/* Status pill (0046) — lower-right corner notifier. Driven by the
   controller's `Status { line }` ViewEvent (clamp warnings on preset load,
   ad-hoc messages). Fades after ~2.4s; pure CSS animation so the JS side
   just sets the line + toggles the `visible` class. */
.status-pill {
  position: fixed;
  right: 10px;
  bottom: 10px;
  background: #0e0e0e;
  border: 1px solid var(--glyph-active);
  border-radius: 3px;
  padding: 3px 8px;
  font-size: 10px;
  color: #f6f6f6;
  white-space: nowrap;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 240ms ease-out;
}
.status-pill.visible { opacity: 1; }

/* Fader — vertical track + thumb. Pointer ops issue Begin/EndGesture
   brackets so the host's automation lane records as one event, not a
   pixel storm. */
.ctl-fader {
  position: relative;
  width: var(--thumb-w);
  height: var(--fader-h);
  cursor: ns-resize;
  /* Hit area extends slightly past the track so a near-miss still grabs. */
  touch-action: none;
}
.ctl-fader-track {
  position: absolute;
  left: calc((var(--thumb-w) - var(--fader-track-w)) / 2);
  top: 0;
  width: var(--fader-track-w);
  height: 100%;
  background: var(--track-bg);
  border-radius: 2px;
  /* Centre tick — useful on bipolar params (coarse, fine, etc.) but harmless
     on unipolar (the tick lands exactly at 0.5 either way). */
}
.ctl-fader-track::before {
  content: '';
  position: absolute;
  left: -3px;
  right: -3px;
  top: 50%;
  height: 1px;
  background: #3a3a3a;
}
.ctl-fader-thumb {
  position: absolute;
  left: 0;
  width: var(--thumb-w);
  height: var(--thumb-h);
  background: var(--thumb-bg);
  border: 1px solid var(--thumb-border);
  border-radius: 1px;
  transform: translateY(-50%);
  top: 50%;
  pointer-events: none;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.15);
}
.ctl-fader.dragging .ctl-fader-thumb {
  box-shadow: 0 0 6px var(--ctl-value);
}

/* Rotary waveform selector (0041). SVG-based: knob face + rotating
   indicator + glyph labels arranged at the corners (SW/NW/NE/SE) outside
   the rim. All visuals + hit-testing live in the SVG; no DOM children to
   reflow. Layout stability comes for free — the dial occupies a fixed
   square (--wave-knob-size) regardless of state. */
.ctl-wave {
  width: var(--wave-knob-size);
  height: var(--wave-knob-size);
  cursor: grab;
  touch-action: none;
}
.ctl-wave.dragging { cursor: grabbing; }

/* Bottom strip — selector/toggle controls (NoiseColor, FilterSlope, etc.)
   relocated into the panel's free clearance below the main column row.
   Absolutely placed so it never grows the panel or competes with ctl
   columns for flex space. Mirrors the vizia editor's strip placement
   (left: 8px, bottom: 4px). */
.panel-strip {
  position: absolute;
  left: 8px;
  bottom: 4px;
  right: 5px;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  pointer-events: none;           /* empty space passes through to body */
}
.panel-strip > * { pointer-events: auto; }

/* Master's strip stacks Oversample (horizontal toggle row) over Limit
   (single toggle) — `panel-strip` defaults to a single horizontal row,
   so this is the one panel that overrides it. */
.master-strip {
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
}

/* Toggle row — small box + inline label. Matches vizia .tg-row /
   .tg-box / .tg-lbl exactly (#1f9cff active fill, 9×9 box, 7 px label). */
.ctl-tg-row {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.ctl-tg-box {
  width: 11px;
  height: 11px;
  background: #4a4a4a;
  border: 1px solid #8a8a8a;
  border-radius: 2px;
  box-sizing: border-box;
}
.ctl-tg-row:hover .ctl-tg-box { border-color: #c4c4c4; }
.ctl-tg-row.active .ctl-tg-box {
  background: #1f9cff;
  border-color: #84cdff;
  box-shadow: 0 0 6px #36b3ff;
}
.ctl-tg-lbl {
  font-size: 9px;
  color: #9a9a9a;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 700;
}
.ctl-tg-row.active .ctl-tg-lbl { color: #ececec; }

/* ButtonGroup — rendered exactly like a strip of toggles (same `.ctl-tg-row`
   children) but inside a normal column with a label on top. Used for
   Oversample / CrossModType / AssignMode. */
.ctl-buttongroup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
}
.ctl-buttongroup .ctl-tg-rows {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-start;
}

/* Dropdown — native <select> styled to match the dark palette. Fallback for
   enums that don't fit ButtonGroup (too many variants, or a long name list). */
.ctl-dropdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
}
.ctl-dropdown select {
  background: #1c1c1c;
  color: var(--text);
  border: 1px solid #444;
  border-radius: 2px;
  font-family: inherit;
  font-size: 10px;
  padding: 1px 4px;
}
.ctl-dropdown select:focus { outline: 1px solid var(--ctl-value); }

/* Dimmed — applied to control cells whose param is gated by a sibling
   (LFO 1's Delay/Fade dim while Free is on; Filter Slope dims when the
   mode is Notch, where the DSP's `FilterMode::mix` ignores slope, see
   vxn-dsp/src/ota_ladder.rs). Visual-only: pointer events still pass
   through so DAW automation echoes still move the thumb. Same selector
   covers both panel-body (`.ctl`) and panel-strip (`.ctl-strip`)
   mounts. */
.ctl.dimmed, .ctl-strip.dimmed, .route-col.dimmed { opacity: 0.4; }

/* Mod-route column (0044): one column header (LFO / Env) over a
   horizontal pair — source selector on the left, depth fader on the
   right — mirroring vxn_ui_vizia's `mod_route_view`. The child
   buttongroup omits its own label (kept structurally for the variant
   rows) since the route header already names the source. */
.route-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}
.route-col-head {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-label);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  height: var(--ctl-label-h);
  line-height: var(--ctl-label-h);
}
.route-col-body {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 6px;
}
.route-col .ctl {
  height: auto;
}

/* Header-switch box (Chorus / Delay, 0045) — a small toggle child of
   `.panel-header-toggle-slot`. Sized to sit *inside* the 16 px header
   bar, not fill it, so the box reads as a control on the header rather
   than the header's whole left edge. Palette matches `.ctl-tg-box` but
   the inactive border picks up a header-tinted shade so it reads as
   part of the header chrome. */
.panel-header-switch {
  width: 10px;
  height: 10px;
  background: #4a4a4a;
  border: 1px solid #2c4a59;
  border-radius: 2px;
  box-sizing: border-box;
  cursor: pointer;
}
.panel-header-switch:hover { border-color: #141414; }
.panel-header-switch.active {
  background: #1f9cff;
  border-color: #84cdff;
  box-shadow: 0 0 6px #36b3ff;
}

/* Voice panel's Detune column — a normal fader on top with the Legato
   toggle beneath it (level with the Solo row in the assign list), so the
   whole column keeps the same width as a plain fader column (0045). */
.ctl-detune {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}
.ctl-detune-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.ctl-detune-legato { margin-top: 4px; }
.ctl-detune-legato.disabled { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>
<div class="faceplate" id="faceplate">

  <div class="banner">VULPUS LABS &mdash; VXN-1</div>

  <div class="preset-bar-slot" id="preset-bar-slot" aria-hidden="true"></div>

  <!-- Row 1 — LFOs, oscillators, mixer. -->
  <div class="row row-1" data-row="1">
    <!-- LFO 1 (0042): per-voice. Shape (rotary) + Rate/Delay/Fade faders in
         the main row; Sync + Free toggles in the bottom strip (matches the
         vizia layout via `in_bottom_strip`). Free is a quirk — when on, it
         keeps the LFO free-running and the Delay/Fade cells dim. -->
    <div class="panel" data-name="LFO 1" data-layered>
      <div class="panel-header">LFO 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo_rate" data-label="Rate"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_delay_time" data-label="Delay"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_fade" data-label="Fade"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo_sync" data-label="Sync"></div>
        <div class="ctl-strip" data-control="switch" data-param="lfo1_free_run" data-label="Free"></div>
      </div>
    </div>
    <!-- LFO 2 (0042): one global oscillator. Shape + Rate up top, Sync in
         the strip. Not layer-aware — params come from GLOBAL_PARAMS. -->
    <div class="panel" data-name="LFO 2">
      <div class="panel-header">LFO 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo2_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo2_rate" data-label="Rate"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo2_sync" data-label="Sync"></div>
      </div>
    </div>
    <!-- Osc 1 (0041): Wave (rotary) + 4 faders. Layer hard-bound to Upper —
         the edit-layer toggle lands with the Voice panel in 0045. The faders
         resolve by descriptor name, not CLAP id, so a `vxn_app::PatchParam`
         reorder doesn't desync the HTML. -->
    <div class="panel" data-name="Osc 1" data-layered>
      <div class="panel-header">OSC 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc1_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc1_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc1_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc1_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc1_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Osc 2 (0041a): identical control set to Osc 1, different param IDs. -->
    <div class="panel" data-name="Osc 2" data-layered>
      <div class="panel-header">OSC 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc2_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc2_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc2_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc2_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc2_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Mixer (0041a): four level faders + Col (White/Pink) switch in the
         bottom strip. NoiseColor is a 2-variant enum; the Switch primitive
         renders it as two exclusive labelled toggles. -->
    <div class="panel" data-name="Mixer" data-layered>
      <div class="panel-header">MIXER</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="osc1_level" data-label="Osc1"></div>
        <div class="ctl" data-control="fader" data-param="osc2_level" data-label="Osc2"></div>
        <div class="ctl" data-control="fader" data-param="ring_level" data-label="Ring"></div>
        <div class="ctl" data-control="fader" data-param="noise_level" data-label="Noise"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="noise_color" data-label="Col"></div>
      </div>
    </div>
  </div>

  <!-- Row 2 — envelopes, filter, filter mod. -->
  <div class="row row-2" data-row="2">
    <!-- Env 1 (0043): ADSR + Shape (Lin/Exp) in the strip. Vizia maps the
         2-variant Shape enum to a switch and routes it through the bottom
         strip alongside FilterSlope etc. -->
    <div class="panel" data-name="Env 1" data-layered>
      <div class="panel-header">ENV 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="env1_attack" data-label="A"></div>
        <div class="ctl" data-control="fader" data-param="env1_decay" data-label="D"></div>
        <div class="ctl" data-control="fader" data-param="env1_sustain" data-label="S"></div>
        <div class="ctl" data-control="fader" data-param="env1_release" data-label="R"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env1_shape" data-label="Shape"></div>
      </div>
    </div>
    <div class="panel" data-name="Env 2" data-layered>
      <div class="panel-header">ENV 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="env2_attack" data-label="A"></div>
        <div class="ctl" data-control="fader" data-param="env2_decay" data-label="D"></div>
        <div class="ctl" data-control="fader" data-param="env2_sustain" data-label="S"></div>
        <div class="ctl" data-control="fader" data-param="env2_release" data-label="R"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env2_shape" data-label="Shape"></div>
      </div>
    </div>
    <!-- VCA (0043): AmpLfoSrc selects the tremolo source — vizia renders
         `Ctl::Select` via `enum_list_body` (vertical stack of labelled
         toggles), same shape as `Ctl::Buttons` (Oversample, AssignMode).
         Map to our `buttongroup` primitive. Depth scales the source. Gate
         (AmpEnvBypass) drops to the strip. -->
    <div class="panel" data-name="VCA" data-layered>
      <div class="panel-header">VCA</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="amp_lfo_src" data-label="LFO"></div>
        <div class="ctl" data-control="fader" data-param="amp_lfo_depth" data-label="Depth" data-dim-when-src-off="amp_lfo_src"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="amp_env_bypass" data-label="Gate"></div>
      </div>
    </div>
    <!-- Filter (0043): HPF/Cutoff/Reso/Drive faders + Mode button group
         (vizia's `Ctl::Select` for FilterMode renders as a labelled-toggle

        <div class="ctl-strip" data-control="switch" data-param="oversample" data-label="OvSmp"></div>
        <div class="ctl-strip" data-control="switch" data-param="limiter_on" data-label="Limit"></div>
      </div>

</div>

<script>
// ─── Bridge bootstrap ──────────────────────────────────────────────────────
//
// `window.vxn.send({op,...})` posts a UiEvent at the controller through wry's
// IPC handler; `window.__vxn.applyViewEvents(arr)` is the batched entry
// point Rust calls via `webview.evaluate_script` once per controller tick
// (0046). `window.vxn.onViewEvent(ev)` is a single-event convenience that
// routes to the same dispatcher — kept for ad-hoc calls and for in-page
// tests.
//
// `window.vxn.params` is the param descriptor table — Rust splices its JSON
// in via the `__PARAMS_JSON__` placeholder below at editor-open time. Keys
// are CLAP ids (numeric); the page builds a name → id index in `init()`.

// Buffer ViewEvents that arrive before `init()` runs. The clack shell's
// CLAP timer (vxn-clap `on_timer`) starts pushing `param_changed` events
// as soon as `set_parent` registers it — that's often before the inline
// `init()` call below has populated the CONTROLS map and rebound the
// dispatcher. Without a buffer the first broadcast (which is the only
// one for params that aren't being automated) is dropped on the floor
// and `lastDisplay` on every fader stays empty until the user wiggles
// something.
const _earlyViewEvents = [];
window.vxn = {
  send: function (msg) {
    try { window.ipc.postMessage(JSON.stringify(msg)); }
    catch (e) { console.warn('vxn.send failed', e); }
  },
  onViewEvent: function (ev) { _earlyViewEvents.push(ev); },
  params: __PARAMS_JSON__,
  // Tempo-sync subdivision labels (coarse → fine). When an LFO rate's sync
  // partner is on, the fader's display reads from this list instead of the
  // descriptor's Hz formatting (0042 / 0015) — mirrors the vizia editor's
  // `sync_partner` override.
  subdivisions: __SUBDIVISIONS_JSON__,
  // Per-patch slot count — used by layer rebinding (0045) to translate an
  // Upper-side CLAP id into its Lower-side twin: Lower id = Upper id +
  // patchCount, for any id under 2 × patchCount.
  patchCount: __PATCH_COUNT__,
};
// Batched bridge entry point. `init()` replaces this with the real dispatcher
// once CONTROLS is built; until then, every event in the batch is buffered.
window.__vxn = {
  applyViewEvents: function (arr) {
    for (const ev of arr) _earlyViewEvents.push(ev);
  },
};

// ─── Floating value popup (single shared instance) ─────────────────────────
//
// One <div> per page, used by every control. Show/update/hide as the
// pointer enters / drags / leaves. Anchored at the pointer's first
// relevant position (entry for hover, grab for drag) so the popup stays
// put while the indicator moves — matches the vizia editor's grabbed-cell
// behaviour. `fixed` positioning + body-level mount means it can't push
// any layout around or be clipped by a panel's overflow.
const valuePop = (() => {
  const el = document.createElement('div');
  el.className = 'value-pop';
  document.body.appendChild(el);
  return {
    show(text, clientX, clientY) {
      el.textContent = text;
      el.style.left = (clientX + 12) + 'px';
      el.style.top  = (clientY - 8)  + 'px';
      el.style.display = 'block';
    },
    update(text) { el.textContent = text; },
    hide() { el.style.display = 'none'; },
  };
})();

// ─── Status pill (0046) ────────────────────────────────────────────────────
//
// One shared <div> in the lower-right corner. `Status { line }` ViewEvents
// flash it for ~2.4s then fade (CSS transition). Re-fired messages reset
// the timer so a rapid burst stays readable.
const statusPill = (() => {
  const el = document.createElement('div');
  el.className = 'status-pill';
  document.body.appendChild(el);
  let timer = null;
  return {
    flash(text) {
      el.textContent = text;
      el.classList.add('visible');
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => el.classList.remove('visible'), 2400);
    },
  };
})();

// ─── Waveform glyph polylines ──────────────────────────────────────────────
//
// In a [0, 1]² box (y down). Ported from `wave_points` in
// vxn-ui-vizia/src/lib.rs — coordinates only, no SVG-specific tweaks.
const WAVE_GLYPHS = {
  'Sine': (() => {
    const pts = [];
    for (let k = 0; k <= 16; k++) {
      const t = k / 16;
      pts.push([t, 0.5 - 0.38 * Math.sin(t * Math.PI * 2)]);
    }
    return pts;
  })(),
  'Triangle': [[0, 0.85], [0.5, 0.15], [1, 0.85]],
  'Tri':      [[0, 0.85], [0.5, 0.15], [1, 0.85]],
  'Saw':      [[0, 0.85], [0.5, 0.15], [0.5, 0.85], [1, 0.15]],
  'Saw+':     [[0, 0.85], [0.5, 0.15], [0.5, 0.85], [1, 0.15]],
  'Saw-':     [[0, 0.15], [0.5, 0.85], [0.5, 0.15], [1, 0.85]],
  'Pulse':    [[0, 0.85], [0, 0.15], [0.5, 0.15], [0.5, 0.85], [1, 0.85]],
  'Square':   [[0, 0.85], [0, 0.15], [0.5, 0.15], [0.5, 0.85], [1, 0.85]],
  'S&H':      [[0, 0.6], [0.28, 0.6], [0.28, 0.2], [0.56, 0.2], [0.56, 0.8], [0.82, 0.8], [0.82, 0.45], [1, 0.45]],
};

function glyphPath(label, w, h) {
  const pts = WAVE_GLYPHS[label];
  if (!pts) return null;
  return pts.map((p, i) =>
    (i === 0 ? 'M' : 'L') + (p[0] * w).toFixed(2) + ' ' + (p[1] * h).toFixed(2)
  ).join(' ');
}

// ─── Control primitives ────────────────────────────────────────────────────

// Per-control state, indexed by CLAP id. Each entry is an array — most ids
// have one updater (the cell that owns the param), but composite cells
// (detune-legato) register secondary watchers on related ids (e.g. the
// Voice panel's detune-legato watches assign_mode alongside the dedicated
// AssignMode buttongroup cell). Dispatch fans the ParamChanged out to
// every updater on the id.
const CONTROLS = new Map();
function addCtl(id, ctl) {
  let arr = CONTROLS.get(id);
  if (!arr) CONTROLS.set(id, arr = []);
  arr.push(ctl);
}

// Last (plain, norm, display) seen per param, indexed by CLAP id. Used by
// the sync-partner refresh path: when an LFO rate's sync flips, we re-run
// the rate's `update` with its cached value so the displayed label flips
// between Hz and a subdivision (0042). Also lets the Free-run dim quirk
// read the toggle's current state without subscribing to the model.
const LAST_PARAM = new Map();

// Map a rate-fader CLAP id to its sync-toggle CLAP id (and vice versa).
// Built in `init()` from descriptor names so a CLAP-id reshuffle in the
// `PatchParam` table doesn't desync the pairing. `Lfo1 rate ↔ Lfo1 sync`
// is per-layer (currently Upper only — 0045 lands the layer toggle);
// `Lfo2 rate ↔ Lfo2 sync` is global.
const SYNC_OF_RATE = new Map();  // rateId -> syncId
const RATE_OF_SYNC = new Map();  // syncId -> rateId

// `lfo1_free_run` and the cells it dims. The Free toggle disables the
// LFO's delay/fade onset (engine behaviour); the editor mirrors it as a
// visual dim (ticket 0042: "visual feedback only … no client-side state
// machine"). Looked up once in `init()`.
let FREE_RUN_ID = null;
const FREE_DIMMED_CELLS = [];  // [{ id, el }]

// `filter_mode` ↔ Slope dim (0043). The DSP's `FilterMode::mix` ignores
// `FilterSlope` when the mode is Notch (the 2-pole notch is structurally
// the cleanest null the ladder can form — see vxn-dsp/src/ota_ladder.rs),
// so the strip switch dims in that mode to signal it's a no-op. The Notch
// variant index is resolved at init from the descriptor's `variants`
// array so a label reorder in `FILTER_MODE_LABELS` doesn't desync.
let FILTER_MODE_ID = null;
let FILTER_NOTCH_INDEX = -1;
const SLOPE_DIMMED_CELLS = [];  // [el]

// One detent = one variant step. The drag sensitivity: pixels of vertical
// pointer travel per detent. ~30 feels close to hardware knobs.
const PIXELS_PER_DETENT = 30;

function makeFader(el, id, desc, opts) {
  const label = el.dataset.label || desc.label;
  const displayOverride = (opts && opts.displayOverride) || null;
  el.innerHTML = `
    <div class="ctl-label">${label.toUpperCase()}</div>
    <div class="ctl-fader">
      <div class="ctl-fader-track"></div>
      <div class="ctl-fader-thumb"></div>
    </div>
  `;
  const fader = el.querySelector('.ctl-fader');
  const thumb = el.querySelector('.ctl-fader-thumb');
  let dragging = false;
  let hovered = false;
  let lastDisplay = '';

  function setThumb(norm) {
    // Norm 0 = bottom, 1 = top. Clamp the thumb's centre so the thumb's
    // *bounding box* stays inside `.ctl-fader` — using `top: <pct>%`
    // with translateY(-50%) put the thumb's top edge 4 px above the
    // fader at norm=1, which overlapped the label above. Pin in pixel
    // space against the live element height instead so the clamp is
    // exact at both ends regardless of --fader-h / --thumb-h tweaks.
    const halfThumb = thumb.offsetHeight / 2;
    const travel = fader.clientHeight - thumb.offsetHeight;
    const yPx = halfThumb + (1 - Math.max(0, Math.min(1, norm))) * travel;
    thumb.style.top = yPx + 'px';
  }

  function pointerNorm(ev) {
    const r = fader.getBoundingClientRect();
    return Math.max(0, Math.min(1, 1 - (ev.clientY - r.top) / r.height));
  }

  fader.addEventListener('pointerenter', (ev) => {
    if (dragging) return;
    hovered = true;
    valuePop.show(lastDisplay, ev.clientX, ev.clientY);
  });
  fader.addEventListener('pointerleave', () => {
    hovered = false;
    if (!dragging) valuePop.hide();
  });

  fader.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    dragging = true;
    fader.classList.add('dragging');
    fader.setPointerCapture(ev.pointerId);
    window.vxn.send({ op: 'begin_gesture', id });
    const n = pointerNorm(ev);
    setThumb(n);                                          // local: no round-trip wait
    window.vxn.send({ op: 'set_param_norm', id, norm: n });
    // Re-anchor the popup at the grab point.
    valuePop.show(lastDisplay, ev.clientX, ev.clientY);
  });
  fader.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    const n = pointerNorm(ev);
    setThumb(n);                                          // local feedback every frame
    window.vxn.send({ op: 'set_param_norm', id, norm: n });
  });
  const endDrag = (ev) => {
    if (!dragging) return;
    dragging = false;
    fader.classList.remove('dragging');
    try { fader.releasePointerCapture(ev.pointerId); } catch (e) {}
    window.vxn.send({ op: 'end_gesture', id });
    if (!hovered) valuePop.hide();
  };
  fader.addEventListener('pointerup', endDrag);
  fader.addEventListener('pointercancel', endDrag);

  return {
    update(plain, norm, display) {
      // ViewEvent echo — always position the thumb so DAW automation
      // moves it even mid-drag (engine value is authoritative). During a
      // drag the local pointermove `setThumb` and the round-trip echo
      // converge on the same value, so the thumb stays glued to the
      // cursor without flicker.
      setThumb(norm);
      // Synced LFO rates swap the Hz readout for a subdivision label
      // (0042). The override is null for every other fader, so this
      // collapses to the plain path.
      let label = display;
      if (displayOverride) {
        const o = displayOverride(plain, norm, display);
        if (o != null) label = o;
      }
      lastDisplay = label;
      if (hovered || dragging) valuePop.update(label);
    },
  };
}

// Map a normalised fader position (linear `[0, 1]`) to the matching
// subdivision label. The LFO rate fader's `norm` is the linear range
// position (`get_normalized`, not the exp-tapered fader-position); since
// `vxn_app::sync::index_from_norm` only ever takes the slider's `0..1`,
// either convention agrees on the index — the table is just spread evenly
// across the travel.
function subdivisionLabel(norm) {
  const t = window.vxn.subdivisions || [];
  if (t.length === 0) return '';
  const last = t.length - 1;
  const n = Math.max(0, Math.min(1, norm));
  return t[Math.max(0, Math.min(last, Math.round(n * last)))];
}

// ─── Rotary waveform knob ──────────────────────────────────────────────────
//
// Single SVG: knob face + rotating indicator + glyph labels spread around
// a 270° arc with the gap at the bottom (clamped knob, no wrap). Drag
// rotation = vertical pointer motion (up = CW, down = CCW), clamped at
// endpoints, snapped to the nearest detent. Click a glyph for direct
// selection.
//
// Variant angles are evenly distributed across ARC_START..ARC_END, so the
// 4-variant Osc knob still lands its glyphs at SW/NW/NE/SE (the corners
// of -135°…+135° "from up CW") while the 6-variant LFO shape fits without
// crowding the corners. Indicator angle is the same affine function of
// value, so the CSS transition always sweeps along the populated arc.
//
// **Future**: when intermediate / cross-fade waveforms ship, this becomes
// a continuous `[0, N)` knob with wrap-around. The angle math already
// works for fractional values; only the drag clamp + glyph-active logic
// need a `wrap: true` branch.
const SVG_NS = 'http://www.w3.org/2000/svg';

function makeWave(el, id, desc) {
  const label = el.dataset.label || desc.label;
  const variants = desc.variants || [];
  el.innerHTML = `<div class="ctl-label">${label.toUpperCase()}</div>`;

  const size = 64;
  const cx = size / 2, cy = size / 2;
  const knobR = 13;
  const glyphR = 26;
  const glyphW = 14, glyphH = 10;

  // 270° arc with a 90° gap at the bottom. Angles measured in degrees CW
  // from "straight up" (0°), so -135° = SW corner, +135° = SE.
  const ARC_START = -135;
  const ARC_SWEEP = 270;
  const N = variants.length;
  const STEP_DEG = N > 1 ? ARC_SWEEP / (N - 1) : 0;
  const variantDeg = (i) => ARC_START + i * STEP_DEG;

  let value = 0;
  let displayedAngle = variantDeg(0);
  let dragging = false;
  let hovered = false;
  let dragStartY = 0;
  let dragStartValue = 0;
  let lastDisplay = variants[0] || '';

  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  svg.classList.add('ctl-wave');
  el.appendChild(svg);

  // Glyph labels along the arc. Transparent rect behind the path makes
  // the whole label area clickable, not just the stroked pixels.
  const glyphEls = variants.map((name, i) => {
    const a = variantDeg(i) * Math.PI / 180;
    const gx = cx + glyphR * Math.sin(a);
    const gy = cy - glyphR * Math.cos(a);
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('transform',
      `translate(${(gx - glyphW / 2).toFixed(2)} ${(gy - glyphH / 2).toFixed(2)})`);
    g.setAttribute('cursor', 'pointer');

    const hit = document.createElementNS(SVG_NS, 'rect');
    hit.setAttribute('x', -3); hit.setAttribute('y', -3);
    hit.setAttribute('width',  glyphW + 6);
    hit.setAttribute('height', glyphH + 6);
    hit.setAttribute('fill', 'transparent');
    g.appendChild(hit);

    const path = document.createElementNS(SVG_NS, 'path');
    const d = glyphPath(name, glyphW, glyphH);
    if (d) {
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke-width', 1.4);
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
    }
    g.appendChild(path);

    g.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      window.vxn.send({ op: 'begin_gesture', id });
      window.vxn.send({ op: 'set_param', id, plain: i });
      window.vxn.send({ op: 'end_gesture', id });
    });

    svg.appendChild(g);
    return { g, path, name };
  });

  // Knob face: rim + inner dimple, both purely visual.
  const rim = document.createElementNS(SVG_NS, 'circle');
  rim.setAttribute('cx', cx); rim.setAttribute('cy', cy);
  rim.setAttribute('r', knobR);
  rim.setAttribute('fill', 'var(--knob-face)');
  rim.setAttribute('stroke', 'var(--knob-rim)');
  rim.setAttribute('stroke-width', 1);
  svg.appendChild(rim);

  const dimple = document.createElementNS(SVG_NS, 'circle');
  dimple.setAttribute('cx', cx); dimple.setAttribute('cy', cy);
  dimple.setAttribute('r', knobR * 0.62);
  dimple.setAttribute('fill', 'var(--knob-dimple)');
  dimple.setAttribute('stroke', 'var(--knob-dimple-rim)');
  dimple.setAttribute('stroke-width', 0.5);
  svg.appendChild(dimple);

  // Rotating indicator — a line from centre to rim, rotated by a <g>.
  // CSS transition smooths automation moves between detents.
  const indicatorG = document.createElementNS(SVG_NS, 'g');
  indicatorG.setAttribute('transform-origin', `${cx} ${cy}`);
  indicatorG.style.transition = 'transform 120ms ease-out';
  const indicator = document.createElementNS(SVG_NS, 'line');
  indicator.setAttribute('x1', cx); indicator.setAttribute('y1', cy);
  indicator.setAttribute('x2', cx); indicator.setAttribute('y2', cy - knobR + 2);
  indicator.setAttribute('stroke', 'var(--knob-indicator)');
  indicator.setAttribute('stroke-width', 2);
  indicator.setAttribute('stroke-linecap', 'round');
  indicatorG.appendChild(indicator);
  svg.appendChild(indicatorG);

  // ── Hover + drag popup ─────────────────────────────────────────────────
  svg.addEventListener('pointerenter', (ev) => {
    if (dragging) return;
    hovered = true;
    valuePop.show(lastDisplay, ev.clientX, ev.clientY);
  });
  svg.addEventListener('pointerleave', () => {
    hovered = false;
    if (!dragging) valuePop.hide();
  });

  // ── Vertical-drag rotation (no wrap) ───────────────────────────────────
  svg.addEventListener('pointerdown', (ev) => {
    // Glyph hits stopPropagation; the knob face falls through to here.
    ev.preventDefault();
    dragging = true;
    dragStartY = ev.clientY;
    dragStartValue = value;
    svg.classList.add('dragging');
    svg.setPointerCapture(ev.pointerId);
    window.vxn.send({ op: 'begin_gesture', id });
    valuePop.show(lastDisplay, ev.clientX, ev.clientY);
  });
  svg.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    const dy = dragStartY - ev.clientY;
    const raw = dragStartValue + dy / PIXELS_PER_DETENT;
    const v = Math.max(0, Math.min(variants.length - 1, Math.round(raw)));
    if (v !== value) {
      window.vxn.send({ op: 'set_param', id, plain: v });
    }
  });
  const endDrag = (ev) => {
    if (!dragging) return;
    dragging = false;
    svg.classList.remove('dragging');
    try { svg.releasePointerCapture(ev.pointerId); } catch (e) {}
    window.vxn.send({ op: 'end_gesture', id });
    if (!hovered) valuePop.hide();
  };
  svg.addEventListener('pointerup', endDrag);
  svg.addEventListener('pointercancel', endDrag);

  function applyValue(v, display) {
    value = v;
    displayedAngle = variantDeg(v);
    indicatorG.setAttribute('transform', `rotate(${displayedAngle.toFixed(2)})`);
    glyphEls.forEach((g, i) => {
      g.path.setAttribute('stroke',
        i === v ? 'var(--glyph-active)' : 'var(--glyph)');
    });
    lastDisplay = display;
    if (hovered || dragging) valuePop.update(display);
  }

  // Seed the initial pose so the indicator + active-glyph state are right
  // before the first ParamChanged echo lands.
  applyValue(0, variants[0] || '');

  return {
    update(plain, norm, display) {
      const v = Math.max(0, Math.min(variants.length - 1, Math.round(plain)));
      applyValue(v, display);
    },
  };
}

// ─── Switch / ButtonGroup / Dropdown ──────────────────────────────────────
//
// All three share the same write semantics: a click sends
// `begin_gesture` → `set_param` → `end_gesture` so the host records a
// single discrete edit (zero gesture-less writes would otherwise drop on
// some hosts that only commit between brackets). No drag, no popup —
// these are point-and-click variant pickers.

function tgRow(name) {
  const row = document.createElement('div');
  row.className = 'ctl-tg-row';
  row.innerHTML =
    '<div class="ctl-tg-box"></div>' +
    '<div class="ctl-tg-lbl">' + name.toUpperCase() + '</div>';
  return row;
}

// `Switch(id, label)` — vertical toggle for bools; also handles 2-variant
// enums (NoiseColor, FilterSlope, LfoSync, …) the way vizia's
// `Ctl::Switch` does, by rendering one toggle per variant in a row.
function makeSwitch(el, id, desc) {
  const label = el.dataset.label || desc.label;
  const isEnum = desc.kind === 'enum';
  const entries = isEnum
    ? (desc.variants || []).map((name, i) => ({ idx: i, name }))
    : [{ idx: 1, name: label }];
  el.innerHTML = '';
  el.style.display = 'inline-flex';
  el.style.flexDirection = 'row';
  el.style.gap = '12px';
  el.style.alignItems = 'center';

  const rows = entries.map(({ idx, name }) => {
    const row = tgRow(name);
    row.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      let plain;
      if (isEnum) {
        plain = idx;
      } else {
        // Bool: toggle current. `row.classList.contains('active')` is the
        // local truth; the round-trip echo will reconcile if the engine
        // refuses (clamped, gated).
        plain = row.classList.contains('active') ? 0 : 1;
      }
      window.vxn.send({ op: 'begin_gesture', id });
      window.vxn.send({ op: 'set_param', id, plain });
      window.vxn.send({ op: 'end_gesture', id });
    });
    el.appendChild(row);
    return { row, idx };
  });

  return {
    update(plain) {
      const p = isEnum
        ? Math.max(0, Math.min(entries.length - 1, Math.round(plain)))
        : (plain >= 0.5 ? 1 : 0);
      rows.forEach(({ row, idx }) => row.classList.toggle('active', idx === p));
    },
  };
}

// `ButtonGroup(id, label, variants)` — for Oversample, CrossModType,
// AssignMode. Vertical stack of labelled toggles under a column label
// (matches vizia's `enum_list_body`).
//
// `data-no-label` — render no column header (used inside `.route-col`,
// where the route header (LFO/Env) is the only column label).
// `data-order` — comma-separated display permutation of the variant
// indices (e.g. `0,3,1,2` for AssignMode → Poly/Twin/Unison/Solo); the
// stored value stays each variant's own descriptor index. Mirrors
// vxn-ui-vizia's `ASSIGN_DISPLAY_ORDER`.
function makeButtonGroup(el, id, desc) {
  const label = el.dataset.label || desc.label;
  const variants = desc.variants || [];
  const noLabel = el.hasAttribute('data-no-label');
  const orderRaw = (el.dataset.order || '').split(',')
    .map((s) => parseInt(s, 10))
    .filter((n) => !isNaN(n) && n >= 0 && n < variants.length);
  const order = orderRaw.length === variants.length
    ? orderRaw
    : variants.map((_, i) => i);
  // Tag the cell so `.ctl-buttongroup .ctl-tg-rows { flex-direction: column }`
  // kicks in — without this the inline-flex `.ctl-tg-row` children flow
  // horizontally and overflow the column. The shape (vertical alongside
  // faders inside panel-body) matches vizia's `enum_list_body`.
  el.classList.add('ctl-buttongroup');
  el.innerHTML =
    (noLabel ? '' : '<div class="ctl-label">' + label.toUpperCase() + '</div>') +
    '<div class="ctl-tg-rows"></div>';
  const rowsHost = el.querySelector('.ctl-tg-rows');
  // `rows[i]` corresponds to variant index `i` (not display position), so
  // the update path can flip the active class by plain value directly.
  const rows = new Array(variants.length);
  for (const n of order) {
    const row = tgRow(variants[n]);
    row.addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      window.vxn.send({ op: 'begin_gesture', id });
      window.vxn.send({ op: 'set_param', id, plain: n });
      window.vxn.send({ op: 'end_gesture', id });
    });
    rowsHost.appendChild(row);
    rows[n] = row;
  }
  return {
    update(plain) {
      const p = Math.max(0, Math.min(variants.length - 1, Math.round(plain)));
      rows.forEach((row, i) => row && row.classList.toggle('active', i === p));
    },
  };
}

// `Dropdown(id, label, variants)` — native <select> fallback. Used when
// the variant list is too long for a row of toggles to fit the cell.
function makeDropdown(el, id, desc) {
  const label = el.dataset.label || desc.label;
  const variants = desc.variants || [];
  el.classList.add('ctl-dropdown');
  el.innerHTML =
    '<div class="ctl-label">' + label.toUpperCase() + '</div>' +
    '<select></select>';
  const select = el.querySelector('select');
  variants.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = v;
    select.appendChild(opt);
  });
  select.addEventListener('change', () => {
    const i = parseInt(select.value, 10);
    window.vxn.send({ op: 'begin_gesture', id });
    window.vxn.send({ op: 'set_param', id, plain: i });
    window.vxn.send({ op: 'end_gesture', id });
  });
  return {
    update(plain) {
      const p = Math.max(0, Math.min(variants.length - 1, Math.round(plain)));
      select.value = String(p);
    },
  };
}

// ─── Header switch (Chorus / Delay, 0045) ──────────────────────────────────
//
// A small toggle box centred inside a panel header's
// `.panel-header-toggle-slot`. Same wire shape as a plain bool `Switch` —
// gesture-bracketed `set_param` on click; update() flips the `.active`
// class on echo. The box is a child of the slot rather than the slot
// itself so the 16 px slot keeps its layout reservation while the visible
// box stays small enough to sit inside the header bar.
function makeHeaderSwitch(el, id, _desc) {
  el.innerHTML = '<div class="panel-header-switch"></div>';
  const box = el.querySelector('.panel-header-switch');
  el.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    const on = box.classList.contains('active') ? 0 : 1;
    window.vxn.send({ op: 'begin_gesture', id });
    window.vxn.send({ op: 'set_param', id, plain: on });
    window.vxn.send({ op: 'end_gesture', id });
  });
  return {
    update(plain) { box.classList.toggle('active', plain >= 0.5); },
  };
}

// ─── Detune + Legato composite (Voice panel, 0045) ─────────────────────────
//
// Two params + one watch in a single column: the Detune fader on top and
// the Legato toggle beneath it, both driven by Assign Mode for visual hints
// (dim Legato in Poly/Twin) and behaviour (Detune fader's full-travel
// meaning is 50 ct in Unison vs 20 ct in Twin — mirrors
// `vxn_ui_vizia::detune_top`). Plain values stay in descriptor units (0–50
// ct); only the fader's [0,1] → cents map changes per mode.
//
// `data-legato-param` / `data-mode-param` name the descriptor names this
// cell pairs with; both are resolved per layer at bind time so a layer
// rebind (0045) rebuilds the cell with the new ids.
function makeDetuneLegato(el, ids, descs) {
  const { detune, legato, mode } = ids;
  const label = el.dataset.label || descs.detune.label;
  el.classList.add('ctl-detune');
  el.innerHTML =
    '<div class="ctl-label">' + label.toUpperCase() + '</div>' +
    '<div class="ctl-detune-body">' +
      '<div class="ctl-fader">' +
        '<div class="ctl-fader-track"></div>' +
        '<div class="ctl-fader-thumb"></div>' +
      '</div>' +
      '<div class="ctl-detune-legato ctl-tg-row"></div>' +
    '</div>';
  const fader = el.querySelector('.ctl-fader');
  const thumb = el.querySelector('.ctl-fader-thumb');
  const legatoRow = el.querySelector('.ctl-detune-legato');
  legatoRow.innerHTML =
    '<div class="ctl-tg-box"></div>' +
    '<div class="ctl-tg-lbl">LEGATO</div>';

  // Twin's useful detune ceiling, mirrors vxn_ui_vizia::TWIN_DETUNE_CT.
  const TWIN_TOP_CT = 20.0;
  const DESC_TOP = descs.detune.max;
  // Twin's variant index lives in the assign descriptor (current order:
  // Poly, Unison, Solo, Twin → index 3). Look it up by name so a reorder
  // in ASSIGN_LABELS doesn't desync.
  const modeVariants = descs.mode.variants || [];
  const TWIN_IDX = modeVariants.indexOf('Twin');
  const MONO_IDXS = new Set();
  // Mono assign modes (Legato applies in these): Unison, Solo. Found by
  // name so an ASSIGN_LABELS reorder doesn't desync.
  ['Unison', 'Solo'].forEach((n) => {
    const i = modeVariants.indexOf(n);
    if (i >= 0) MONO_IDXS.add(i);
  });

  let dragging = false;
  let hovered = false;
  let lastDetunePlain = 0;
  let lastModePlain = 0;

  function currentTop() {
    return Math.round(lastModePlain) === TWIN_IDX ? TWIN_TOP_CT : DESC_TOP;
  }
  function setThumbFromPlain(plain) {
    const top = currentTop();
    const halfThumb = thumb.offsetHeight / 2;
    const travel = fader.clientHeight - thumb.offsetHeight;
    const norm = top > 0 ? Math.max(0, Math.min(1, plain / top)) : 0;
    thumb.style.top = (halfThumb + (1 - norm) * travel) + 'px';
  }
  function pointerNorm(ev) {
    const r = fader.getBoundingClientRect();
    return Math.max(0, Math.min(1, 1 - (ev.clientY - r.top) / r.height));
  }

  fader.addEventListener('pointerenter', (ev) => {
    if (dragging) return;
    hovered = true;
    valuePop.show(lastDetunePlain.toFixed(1) + ' ct', ev.clientX, ev.clientY);
  });
  fader.addEventListener('pointerleave', () => {
    hovered = false;
    if (!dragging) valuePop.hide();
  });
  fader.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    dragging = true;
    fader.classList.add('dragging');
    fader.setPointerCapture(ev.pointerId);
    window.vxn.send({ op: 'begin_gesture', id: detune });
    const plain = pointerNorm(ev) * currentTop();
    lastDetunePlain = plain;
    setThumbFromPlain(plain);
    window.vxn.send({ op: 'set_param', id: detune, plain });
    valuePop.show(plain.toFixed(1) + ' ct', ev.clientX, ev.clientY);
  });
  fader.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    const plain = pointerNorm(ev) * currentTop();
    lastDetunePlain = plain;
    setThumbFromPlain(plain);
    window.vxn.send({ op: 'set_param', id: detune, plain });
    valuePop.update(plain.toFixed(1) + ' ct');
  });
  const endDrag = (ev) => {
    if (!dragging) return;
    dragging = false;
    fader.classList.remove('dragging');
    try { fader.releasePointerCapture(ev.pointerId); } catch (e) {}
    window.vxn.send({ op: 'end_gesture', id: detune });
    if (!hovered) valuePop.hide();
  };
  fader.addEventListener('pointerup', endDrag);
  fader.addEventListener('pointercancel', endDrag);

  legatoRow.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    const on = legatoRow.classList.contains('active') ? 0 : 1;
    window.vxn.send({ op: 'begin_gesture', id: legato });
    window.vxn.send({ op: 'set_param', id: legato, plain: on });
    window.vxn.send({ op: 'end_gesture', id: legato });
  });
  // Double-click resets the detune fader (descriptor default).
  el.addEventListener('dblclick', (ev) => {
    ev.preventDefault();
    window.vxn.send({ op: 'begin_gesture', id: detune });
    window.vxn.send({ op: 'set_param', id: detune, plain: descs.detune.default });
    window.vxn.send({ op: 'end_gesture', id: detune });
  });

  function applyLegatoDim() {
    legatoRow.classList.toggle('disabled', !MONO_IDXS.has(Math.round(lastModePlain)));
  }

  return {
    // The composite registers three CONTROLS entries (detune, legato, mode)
    // pointing at three updater closures returned here — `init()` then
    // routes each ParamChanged into the matching closure.
    detuneUpdate(plain, _norm, display) {
      lastDetunePlain = plain;
      setThumbFromPlain(plain);
      if (hovered || dragging) {
        valuePop.update(display || (plain.toFixed(1) + ' ct'));
      }
    },
    legatoUpdate(plain) {
      legatoRow.classList.toggle('active', plain >= 0.5);
    },
    modeUpdate(plain) {
      const prevTwin = Math.round(lastModePlain) === TWIN_IDX;
      lastModePlain = plain;
      // On entering Twin, clamp the stored detune down to the Twin ceiling
      // (mirrors `vxn_ui_vizia::clamp_detune_on_twin`). The engine doesn't
      // enforce this — Twin's "useful" range is purely a view convention,
      // so the editor that surfaces the mode is the one that has to clamp.
      if (!prevTwin && Math.round(plain) === TWIN_IDX && lastDetunePlain > TWIN_TOP_CT) {
        window.vxn.send({ op: 'begin_gesture', id: detune });
        window.vxn.send({ op: 'set_param', id: detune, plain: TWIN_TOP_CT });
        window.vxn.send({ op: 'end_gesture', id: detune });
        lastDetunePlain = TWIN_TOP_CT;
      }
      setThumbFromPlain(lastDetunePlain);
      applyLegatoDim();
    },
  };
}

// ─── Init + dispatch ───────────────────────────────────────────────────────

// Lowest-id name lookup — for a per-patch param this is the Upper-layer id
// (id < patchCount); for a global it's the global id directly. Layer
// rebinding (0045) translates Upper → Lower with `+patchCount`.
function paramIdByName(name) {
  for (const k in window.vxn.params) {
    if (window.vxn.params[k].name === name) return parseInt(k, 10);
  }
  return null;
}

// Per-layer name → id lookup. Globals (id ≥ 2·patchCount) are layer-
// independent and pass through unchanged. Per-patch ids translate from
// Upper to Lower by adding `patchCount` (the slot offset that
// `vxn_app::patch_clap_id` bakes in: lower_id = upper_id + PATCH_COUNT).
function paramIdByNameAtLayer(name, layer) {
  const upper = paramIdByName(name);
  if (upper == null) return null;
  const pc = window.vxn.patchCount;
  if (upper >= 2 * pc) return upper;
  return layer === 'lower' ? upper + pc : upper;
}

function isLayeredEl(el) {
  return el.closest('[data-layered]') != null;
}

// Active edit layer. Mutated by EditLayerChanged dispatch (0045);
// initial value matches the controller's default (Upper).
let CURRENT_LAYER = 'upper';

// Element references for the cells dimmed by the Free-run quirk (LFO 1
// only). Resolved per current layer (LFO 1 is per-patch).
function locateFreeRunCells(layer) {
  FREE_RUN_ID = paramIdByNameAtLayer('lfo1_free_run', layer);
  FREE_DIMMED_CELLS.length = 0;
  for (const name of ['lfo1_delay_time', 'lfo1_fade']) {
    const id = paramIdByNameAtLayer(name, layer);
    if (id == null) continue;
    const el = document.querySelector(`[data-param="${name}"]`);
    if (el) FREE_DIMMED_CELLS.push({ id, el });
  }
}

// Resolve the Filter Mode param + the Notch variant's plain index, plus
// the Slope cell that dims with it (0043). `variants` ships in the
// descriptor JSON, so a `FILTER_MODE_LABELS` reorder doesn't break this.
function locateSlopeDimCells(layer) {
  FILTER_MODE_ID = paramIdByNameAtLayer('filter_mode', layer);
  if (FILTER_MODE_ID != null) {
    const variants = window.vxn.params[FILTER_MODE_ID].variants || [];
    FILTER_NOTCH_INDEX = variants.indexOf('Notch');
  }
  SLOPE_DIMMED_CELLS.length = 0;
  const slope = document.querySelector('[data-param="filter_slope"]');
  if (slope) SLOPE_DIMMED_CELLS.push(slope);
}

// Pair sync-able rate/time faders with their sync-toggle partners (E004 /
// 0015). Mirrors `vxn_ui_vizia::sync_partner`: LFO 1 rate ↔ LFO 1 sync
// (per-patch), LFO 2 rate ↔ LFO 2 sync (global), Delay Time ↔ Delay Sync
// (global, 0045). Resolved per current layer.
function locateSyncPartners(layer) {
  SYNC_OF_RATE.clear();
  RATE_OF_SYNC.clear();
  const pairs = [
    ['lfo_rate',   'lfo_sync'],
    ['lfo2_rate',  'lfo2_sync'],
    ['delay_time', 'delay_sync'],
  ];
  for (const [rateName, syncName] of pairs) {
    const r = paramIdByNameAtLayer(rateName, layer);
    const s = paramIdByNameAtLayer(syncName, layer);
    if (r == null || s == null) continue;
    SYNC_OF_RATE.set(r, s);
    RATE_OF_SYNC.set(s, r);
  }
}

// ─── Generic dim rules (0044) ──────────────────────────────────────────────
//
// Per-cell HTML markers register a dim rule resolved at bind time:
//   `data-dim-when-src-off="srcName"` — dim self when the named source
//     selector reads `Off` (the depth fader paired with a source
//     buttongroup: Pitch/PWM Mod, Cross Mod's osc2 Mod). Source
//     selectors themselves stay bright; only their paired fader dims so
//     a routed-Off path is still readable + clickable.
//   `data-dim-unless-fm="typeName"` — dim self unless the named type
//     selector reads the `FM` variant. Cross Mod's Amount fader only
//     drives PM (labelled FM, ADR 0004 §3), so it greys out for Off and
//     Sync, matching `vxn_ui_vizia::xmod_pair`.
//
// One pass collects the specs from the DOM; resolution to current-layer
// CLAP ids happens on every (re)bind so a layer flip rebuilds them
// without touching the markup.
const DIM_RULE_SPECS = [];   // [{ kind, watchName, target }]
const DIM_RULES = [];        // [{ watchId, predicate, target }] — keyed by id

function collectDimRuleSpecs() {
  DIM_RULE_SPECS.length = 0;
  document.querySelectorAll('[data-dim-when-src-off]').forEach((el) => {
    DIM_RULE_SPECS.push({
      kind: 'src-off',
      watchName: el.dataset.dimWhenSrcOff,
      target: el,
    });
  });
  document.querySelectorAll('[data-dim-unless-fm]').forEach((el) => {
    DIM_RULE_SPECS.push({
      kind: 'unless-fm',
      watchName: el.dataset.dimUnlessFm,
      target: el,
    });
  });
}

function resolveDimRules(layer) {
  DIM_RULES.length = 0;
  for (const spec of DIM_RULE_SPECS) {
    const watchId = paramIdByNameAtLayer(spec.watchName, layer);
    if (watchId == null) continue;
    let predicate;
    if (spec.kind === 'src-off') {
      predicate = (plain) => Math.round(plain) === 0;
    } else if (spec.kind === 'unless-fm') {
      const variants = window.vxn.params[watchId].variants || [];
      const fmIdx = variants.indexOf('FM');
      predicate = (plain) => fmIdx < 0 || Math.round(plain) !== fmIdx;
    } else {
      continue;
    }
    DIM_RULES.push({ watchId, predicate, target: spec.target });
  }
}

function applyDimRulesFor(id, plain) {
  for (const r of DIM_RULES) {
    if (r.watchId !== id) continue;
    r.target.classList.toggle('dimmed', r.predicate(plain));
  }
}

// Re-apply every dim rule from cached last-known values. Called after a
// layer rebind so the new layer's bindings reflect the correct dim state
// before any fresh ParamChanged echoes arrive.
function refreshAllDimRules() {
  for (const r of DIM_RULES) {
    const last = LAST_PARAM.get(r.watchId);
    if (!last) continue;
    r.target.classList.toggle('dimmed', r.predicate(last.plain));
  }
}

// Returns the `displayOverride` callback for `id` if it's a rate fader
// whose sync partner is currently on. The fader's `update` runs this
// before settling on a popup label.
function rateDisplayOverride(id) {
  const syncId = SYNC_OF_RATE.get(id);
  if (syncId == null) return null;
  return (plain, norm, display) => {
    const last = LAST_PARAM.get(syncId);
    if (last && last.plain >= 0.5) return subdivisionLabel(norm);
    return null;
  };
}

// Per-cell binding info, captured at init so a layer rebind can rebuild
// each cell against its new (layer-translated) CLAP id without re-walking
// the DOM. Composite cells (detune-legato) carry their secondary
// descriptor-name dependencies alongside the primary param name.
const LAYERED_CELLS = [];      // [{ el, kind, name, extras? }]
const STATIC_CELLS = [];       // same shape, but layer-independent

function bindCell(entry, layer) {
  const { el, kind, name } = entry;
  const id = paramIdByNameAtLayer(name, layer);
  if (id == null) return null;
  const desc = window.vxn.params[id];
  let ctl = null;
  switch (kind) {
    case 'fader': {
      const opts = { displayOverride: rateDisplayOverride(id) };
      ctl = makeFader(el, id, desc, opts);
      break;
    }
    case 'wave':          ctl = makeWave(el, id, desc); break;
    case 'switch':        ctl = makeSwitch(el, id, desc); break;
    case 'buttongroup':   ctl = makeButtonGroup(el, id, desc); break;
    case 'dropdown':      ctl = makeDropdown(el, id, desc); break;
    case 'header-switch': ctl = makeHeaderSwitch(el, id, desc); break;
    case 'detune-legato': {
      const legatoId = paramIdByNameAtLayer(entry.extras.legatoName, layer);
      const modeId   = paramIdByNameAtLayer(entry.extras.modeName, layer);
      if (legatoId == null || modeId == null) return null;
      const composite = makeDetuneLegato(
        el,
        { detune: id, legato: legatoId, mode: modeId },
        {
          detune: desc,
          legato: window.vxn.params[legatoId],
          mode:   window.vxn.params[modeId],
        },
      );
      // Fan composite updaters through CONTROLS by id. Mode is also bound
      // by the AssignMode buttongroup cell — `addCtl` keeps both updaters
      // alive on the same id so the buttongroup repaints and the detune-
      // legato visuals (top-override, Legato dim, Twin clamp) follow the
      // same echo.
      addCtl(id,       { update: (p, n, d) => composite.detuneUpdate(p, n, d) });
      addCtl(legatoId, { update: (p) => composite.legatoUpdate(p) });
      addCtl(modeId,   { update: (p) => composite.modeUpdate(p) });
      return { ids: [id, legatoId, modeId] };
    }
    default:
      console.warn('vxn: unknown control type', kind);
      return null;
  }
  addCtl(id, ctl);

  // Double-click resets the param to its descriptor default — mirrors
  // the vizia editor's `.on_double_click` (bracketed by a gesture so
  // the host records one edit). Wired on the cell root so it covers
  // every primitive uniformly; the intermediate single-click value
  // changes still fire and the reset lands last. (Header-switch is a
  // bool toggle — double-clicking it would just toggle twice; skip.)
  if (kind !== 'header-switch') {
    el.addEventListener('dblclick', (ev) => {
      ev.preventDefault();
      window.vxn.send({ op: 'begin_gesture', id });
      window.vxn.send({ op: 'set_param', id, plain: desc.default });
      window.vxn.send({ op: 'end_gesture', id });
    });
  }
  return { ids: [id] };
}

function rebindAllForLayer(layer) {
  // Drop every prior binding — closures held the old ids; the only safe
  // way to retarget is to start fresh. CONTROLS is the routing table for
  // ParamChanged dispatch, so emptying it before re-bind avoids stale
  // updates landing on the old (now-orphaned) primitives.
  CONTROLS.clear();
  for (const entry of LAYERED_CELLS) {
    // Reset the cell so a re-init clears whatever the previous primitive
    // dropped onto el (innerHTML / inline styles / classes specific to
    // its kind). Easier than per-primitive teardown.
    entry.el.innerHTML = '';
    entry.el.removeAttribute('style');
    entry.el.classList.remove(
      'ctl-buttongroup', 'ctl-dropdown', 'ctl-detune', 'dimmed',
    );
    bindCell(entry, layer);
  }
  for (const entry of STATIC_CELLS) {
    bindCell(entry, layer);
  }
  // The "watched id" of every quirk rule moves with the layer; re-resolve.
  locateSyncPartners(layer);
  locateFreeRunCells(layer);
  locateSlopeDimCells(layer);
  resolveDimRules(layer);
  // Reseed the visual dim state from cached last-known values so a layer
  // rebind reflects the new layer's state before any echo arrives.
  refreshAllDimRules();
  // Feed cached values into freshly-rebound controls (the new ids are
  // already in LAST_PARAM from the editor-ready broadcast).
  for (const [id, ctls] of CONTROLS) {
    const last = LAST_PARAM.get(id);
    if (!last) continue;
    for (const c of ctls) c.update(last.plain, last.norm, last.display);
  }
}

function init() {
  // Categorize every mount point by descriptor name + kind, layer-
  // agnostic. The actual id resolution + primitive instantiation happens
  // in `rebindAllForLayer`, which is also what a layer flip calls.
  document.querySelectorAll('[data-control]').forEach((el) => {
    const name = el.dataset.param;
    if (!name) return;
    const kind = el.dataset.control;
    const entry = { el, kind, name };
    if (kind === 'detune-legato') {
      entry.extras = {
        legatoName: el.dataset.legatoParam,
        modeName: el.dataset.modeParam,
      };
    }
    (isLayeredEl(el) ? LAYERED_CELLS : STATIC_CELLS).push(entry);
  });
  collectDimRuleSpecs();
  rebindAllForLayer(CURRENT_LAYER);

  // Dispatch one ViewEvent from Rust. ParamChanged routes by id (with the
  // partner-rate / free-run / filter-mode / generic-dim side effects pulled
  // in from 0042–0044). EditLayerChanged triggers a full layered-cell
  // rebind (0045). Status flashes the lower-right pill (0046). KeyModeChanged
  // / PresetLoaded / PresetCorpusChanged are still pre-wiring — log when
  // verbose tracing is on so the contract is visible without spamming the
  // console during automation.
  const dispatch = function (ev) {
    if (ev.kind === 'param_changed') {
      // Cache last-seen value so the sync-flip / free-run-flip / layer-
      // rebind reseed paths can reapply without waiting for the next echo.
      LAST_PARAM.set(ev.id, { plain: ev.plain, norm: ev.norm, display: ev.display });
      const ctls = CONTROLS.get(ev.id);
      if (ctls) for (const c of ctls) c.update(ev.plain, ev.norm, ev.display);
      // If this is an LFO/Delay sync toggle, the partnered rate/time fader
      // display label needs to flip Hz/s ↔ subdivision. Re-update the
      // partner with its last-seen value — the fader's displayOverride
      // will recompute.
      const rateId = RATE_OF_SYNC.get(ev.id);
      if (rateId != null) {
        const last = LAST_PARAM.get(rateId);
        const rateCtls = CONTROLS.get(rateId);
        if (last && rateCtls) {
          for (const c of rateCtls) c.update(last.plain, last.norm, last.display);
        }
      }
      // Free-run toggle changes which Delay/Fade cells render dim.
      if (ev.id === FREE_RUN_ID) {
        const on = ev.plain >= 0.5;
        for (const c of FREE_DIMMED_CELLS) c.el.classList.toggle('dimmed', on);
      }
      // Filter Mode = Notch → slope is a no-op (DSP), so dim the strip.
      if (ev.id === FILTER_MODE_ID && FILTER_NOTCH_INDEX >= 0) {
        const dim = Math.round(ev.plain) === FILTER_NOTCH_INDEX;
        for (const el of SLOPE_DIMMED_CELLS) el.classList.toggle('dimmed', dim);
      }
      // Generic dim rules (0044): source-Off, Cross Mod Type ≠ FM, etc.
      applyDimRulesFor(ev.id, ev.plain);
      return;
    }
    if (ev.kind === 'edit_layer_changed') {
      const layer = ev.layer === 'lower' ? 'lower' : 'upper';
      if (layer === CURRENT_LAYER) return;
      CURRENT_LAYER = layer;
      rebindAllForLayer(layer);
      return;
    }
    if (ev.kind === 'status') {
      statusPill.flash(ev.line);
      return;
    }
    // key_mode_changed / preset_loaded / preset_corpus_changed land here.
    // E011 / 0049+ wire the Keys + preset browser areas; for now they are
    // intentional no-ops so the bridge stays quiet under normal play.
    // Uncomment for verbose tracing during development:
    // console.log('vxn:view', ev);
  };
  // Batched bridge entry — Rust calls this once per controller tick.
  const applyViewEvents = function (arr) {
    for (const ev of arr) dispatch(ev);
  };
  // Replay any events buffered between bootstrap and init.
  for (const ev of _earlyViewEvents) dispatch(ev);
  _earlyViewEvents.length = 0;
  window.__vxn.applyViewEvents = applyViewEvents;
  window.vxn.onViewEvent = dispatch;

  // Tell the controller we're ready — it re-broadcasts every param + key
  // mode so any first-tick `push_param_diffs` that ran before
  // `window.vxn` even existed (real race against wry's HTML load) gets
  // re-sent into a now-wired dispatcher. Without this, sliders that
  // never received their seed `ParamChanged` show an empty hover popup
  // until the user wiggles them.
  window.vxn.send({ op: 'ready' });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>

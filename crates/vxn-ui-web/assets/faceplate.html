<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VXN1</title>
<style>
__CSS__
</style>
</head>
<body>
<div class="faceplate" id="faceplate">

  <div class="banner">VULPUS LABS &mdash; VXN-1</div>

  <!-- Preset bar (0049). Prev/next walk the combined Factory + User
       list (controller-side via UiEvent::StepPreset); Browse toggles a
       view-side `browserOpen` flag 0050 will bind a panel to; Save As
       opens the 0048 floating popup, commits with `folder: null`
       (defaults to user root until 0051 ties browser selection in). -->
  <div class="preset-bar-slot" id="preset-bar-slot">
    <button class="pbar-btn pbar-step" id="pbar-prev" type="button" aria-label="Previous preset">&lt;</button>
    <div class="pbar-name" id="pbar-name"></div>
    <button class="pbar-btn pbar-step" id="pbar-next" type="button" aria-label="Next preset">&gt;</button>
    <button class="pbar-btn" id="pbar-browse" type="button">Browse</button>
    <button class="pbar-btn" id="pbar-save" type="button">Save As</button>
    <div class="pbar-spacer"></div>
    <div class="status-pill" id="pbar-status"></div>
  </div>

  <!-- Preset browser panel (0050). Two-pane folders / presets list with a
       case-insensitive substring search across the selected folder. Hidden
       until the preset bar's Browse toggle flips on; populated from the
       controller's corpus snapshot pushed via
       `window.__vxn.applyPresetCorpus`. -->
  <div class="browser-backdrop" id="browser-backdrop" hidden></div>
  <div class="browser-panel" id="browser-panel" hidden>
    <button class="browser-close" id="browser-close" type="button" aria-label="Close browser">&times;</button>
    <div class="browser-search">
      <input type="text" id="browser-search-input" placeholder="Search…" autocomplete="off" />
      <button class="browser-search-clear" id="browser-search-clear" type="button" aria-label="Clear search">&times;</button>
    </div>
    <div class="browser-panes">
      <div class="browser-pane browser-pane-folders" id="browser-folders"></div>
      <div class="browser-pane browser-pane-presets" id="browser-presets"></div>
    </div>
  </div>

  <!-- Row 1 — LFOs, oscillators, mixer. -->
  <div class="row row-1" data-row="1">
    <!-- LFO 1 (0042): per-voice. Shape (rotary) + Rate/Delay/Fade faders in
         the main row; Sync + Free toggles in the bottom strip (matches the
         vizia layout via `in_bottom_strip`). Free is a quirk — when on, it
         keeps the LFO free-running and the Delay/Fade cells dim. -->
    <div class="panel" data-name="LFO 1" data-layered>
      <div class="panel-header">LFO 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo_rate" data-label="Rate"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_delay_time" data-label="Delay"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_fade" data-label="Fade"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo_sync" data-label="Sync"></div>
        <div class="ctl-strip" data-control="switch" data-param="lfo1_free_run" data-label="Free"></div>
      </div>
    </div>
    <!-- LFO 2 (0042): one global oscillator. Shape + Rate up top, Sync in
         the strip. Not layer-aware — params come from GLOBAL_PARAMS. -->
    <div class="panel" data-name="LFO 2">
      <div class="panel-header">LFO 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo2_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo2_rate" data-label="Rate"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo2_sync" data-label="Sync"></div>
      </div>
    </div>
    <!-- Osc 1 (0041): Wave (rotary) + 4 faders. Layer hard-bound to Upper —
         the edit-layer toggle lands with the Voice panel in 0045. The faders
         resolve by descriptor name, not CLAP id, so a `vxn_app::PatchParam`
         reorder doesn't desync the HTML. -->
    <div class="panel" data-name="Osc 1" data-layered>
      <div class="panel-header">OSC 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc1_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc1_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc1_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc1_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc1_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Osc 2 (0041a): identical control set to Osc 1, different param IDs. -->
    <div class="panel" data-name="Osc 2" data-layered>
      <div class="panel-header">OSC 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc2_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc2_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc2_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc2_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc2_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Mixer (0041a, 0061, 0062): four level faders + Col (White/Pink) switch
         in the bottom strip. NoiseColor is a 2-variant enum; the Switch
         primitive renders it as two exclusive labelled toggles. Ring lives on
         the XMod panel's CrossModType — when engaged it displaces osc1 in this
         strip. Sub is a Juno-style square one octave below osc1 (osc2 under
         Sync), phase-locked to the source's flipflop. -->
    <div class="panel" data-name="Mixer" data-layered>
      <div class="panel-header">MIXER</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="osc1_level" data-label="Osc1"></div>
        <div class="ctl" data-control="fader" data-param="osc2_level" data-label="Osc2"></div>
        <div class="ctl" data-control="fader" data-param="sub_level" data-label="Sub"></div>
        <div class="ctl" data-control="fader" data-param="noise_level" data-label="Noise"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="noise_color" data-label="Col"></div>
      </div>
    </div>
  </div>

  <!-- Row 2 — envelopes, filter, filter mod. -->
  <div class="row row-2" data-row="2">
    <!-- Env 1 (0043): ADSR + Shape (Lin/Exp) in the strip. Vizia maps the
         2-variant Shape enum to a switch and routes it through the bottom
         strip alongside FilterSlope etc. -->
    <div class="panel" data-name="Env 1" data-layered>
      <div class="panel-header">ENV 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="env1_attack" data-label="A"></div>
        <div class="ctl" data-control="fader" data-param="env1_decay" data-label="D"></div>
        <div class="ctl" data-control="fader" data-param="env1_sustain" data-label="S"></div>
        <div class="ctl" data-control="fader" data-param="env1_release" data-label="R"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env1_shape" data-label="Shape"></div>
      </div>
    </div>
    <div class="panel" data-name="Env 2" data-layered>
      <div class="panel-header">ENV 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="env2_attack" data-label="A"></div>
        <div class="ctl" data-control="fader" data-param="env2_decay" data-label="D"></div>
        <div class="ctl" data-control="fader" data-param="env2_sustain" data-label="S"></div>
        <div class="ctl" data-control="fader" data-param="env2_release" data-label="R"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env2_shape" data-label="Shape"></div>
      </div>
    </div>
    <!-- VCA (0043): AmpLfoSrc selects the tremolo source — vizia renders
         `Ctl::Select` via `enum_list_body` (vertical stack of labelled
         toggles), same shape as `Ctl::Buttons` (Oversample, AssignMode).
         Map to our `buttongroup` primitive. Depth scales the source. Gate
         (AmpEnvBypass) drops to the strip. -->
    <div class="panel" data-name="VCA" data-layered>
      <div class="panel-header">VCA</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="amp_lfo_src" data-label="LFO"></div>
        <div class="ctl" data-control="fader" data-param="amp_lfo_depth" data-label="Depth" data-dim-when-src-off="amp_lfo_src"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="amp_env_bypass" data-label="Gate"></div>
      </div>
    </div>
    <!-- Filter (0043): HPF/Cutoff/Reso/Drive faders + Mode button group
         (vizia's `Ctl::Select` for FilterMode renders as a labelled-toggle
         stack via `enum_list_body`). Slope (12/24 dB) and KeyTrk (bool)
         are strip switches per `in_bottom_strip`. -->
    <div class="panel" data-name="Filter" data-layered>
      <div class="panel-header">FILTER</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="filter_mode" data-label="Mode"></div>
        <div class="ctl" data-control="fader" data-param="hpf_cutoff" data-label="HPF"></div>
        <div class="ctl" data-control="fader" data-param="cutoff" data-label="Cutoff"></div>
        <div class="ctl" data-control="fader" data-param="resonance" data-label="Reso"></div>
        <div class="ctl" data-control="fader" data-param="drive" data-label="Drive"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="filter_slope" data-label="Slope"></div>
        <div class="ctl-strip" data-control="switch" data-param="filter_key_track" data-label="KeyTrk"></div>
      </div>
    </div>
    <!-- Filter Mod (0043): four fixed-source depths into cutoff (E006: no
         source selectors). Plain four-fader row. -->
    <div class="panel" data-name="Filter Mod" data-layered>
      <div class="panel-header">FILTER MOD</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="vel_cutoff_depth" data-label="Vel"></div>
        <div class="ctl" data-control="fader" data-param="cutoff_lfo1_depth" data-label="LFO1"></div>
        <div class="ctl" data-control="fader" data-param="cutoff_lfo2_depth" data-label="LFO2"></div>
        <div class="ctl" data-control="fader" data-param="cutoff_env_depth" data-label="Env1"></div>
      </div>
    </div>
  </div>

  <!-- Row 3 — per-osc mod routes + performance wheels (Bend is fixed-width). -->
  <div class="row row-3" data-row="3">
    <!-- Pitch Mod (0044): two route columns. Each column = one header
         (LFO / Env) over a horizontal pair: source buttongroup left,
         depth fader right (matches vxn_ui_vizia's `mod_route_view`). The
         source buttongroup carries `data-no-label` (route header is the
         only column label) and stays full-opacity so a routed-Off path
         is still readable + clickable; the *depth fader* dims via
         `data-dim-when-src-off` when its source reads Off (variant 0),
         signalling that the slider does nothing right now. -->
    <div class="panel" data-name="Pitch Mod" data-layered>
      <div class="panel-header">PITCH MOD</div>
      <div class="panel-body">
        <div class="route-col">
          <div class="route-col-head">LFO</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pitch_lfo_src" data-label="LFO" data-no-label></div>
            <div class="route-col-stack">
              <div class="ctl" data-control="fader" data-param="pitch_lfo_depth" data-dim-when-src-off="pitch_lfo_src" data-no-label></div>
              <div class="ctl" data-control="switch" data-param="pitch_lfo_mod_only" data-label="Mod"></div>
            </div>
          </div>
        </div>
        <div class="route-col">
          <div class="route-col-head">Env</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pitch_env_src" data-label="Env" data-no-label></div>
            <div class="route-col-stack">
              <div class="ctl" data-control="fader" data-param="pitch_env_depth" data-dim-when-src-off="pitch_env_src" data-no-label></div>
              <div class="ctl" data-control="switch" data-param="pitch_env_mod_only" data-label="Mod"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel" data-name="PWM Mod" data-layered>
      <div class="panel-header">PWM MOD</div>
      <div class="panel-body">
        <div class="route-col">
          <div class="route-col-head">LFO</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pwm_lfo_src" data-label="LFO" data-no-label></div>
            <div class="ctl" data-control="fader" data-param="pwm_lfo_depth" data-dim-when-src-off="pwm_lfo_src" data-no-label></div>
          </div>
        </div>
        <div class="route-col">
          <div class="route-col-head">Env</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pwm_env_src" data-label="Env" data-no-label></div>
            <div class="ctl" data-control="fader" data-param="pwm_env_depth" data-dim-when-src-off="pwm_env_src" data-no-label></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Cross Mod (0044): Type {Off/Sync/FM} sits beside its Amount fader.
         Amount only drives FM/PM depth — dims for anything other than FM,
         matching vxn-ui-vizia's xmod_pair. Env→pitch modulation lives in
         Pitch Mod's Env route (with a "Mod" switch that diverts env→pitch to
         the cross-mod modulator: slave/osc1 under Sync, modulator/osc2 under
         FM); mod-wheel routing to sweep stays in the Mod Wheel panel.
         The descriptor labels Pulse-Modulation as "FM" — players expect that
         name (ADR 0004 §3); the ticket's "Off/Sync/PM" maps onto the same
         three variants. -->
    <div class="panel" data-name="Cross Mod" data-layered>
      <div class="panel-header">CROSS MOD</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="cross_mod_type" data-label="Type"></div>
        <div class="ctl" data-control="fader" data-param="cross_mod_amount" data-label="Amt" data-dim-unless-fm="cross_mod_type"></div>
      </div>
    </div>
    <div class="panel" data-name="Mod Wheel" data-layered>
      <div class="panel-header">MOD WHEEL</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="mod_wheel_pwm" data-label="PWM"></div>
        <div class="ctl" data-control="fader" data-param="mod_wheel_cutoff" data-label="Cutoff"></div>
        <div class="ctl" data-control="fader" data-param="mod_wheel_reso" data-label="Reso"></div>
        <div class="ctl" data-control="fader" data-param="mod_wheel_cross_mod_sweep" data-label="X-Mod"></div>
      </div>
    </div>
    <!-- Bend (0044): single Range fader (vibrato-scaled semitone range for
         the pitch wheel, both oscillators). Panel pinned to 54px via the
         `.row-3 .panel[data-name="Bend"]` flex rule above. -->
    <div class="panel" data-name="Bend" data-layered>
      <div class="panel-header">BEND</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="pitch_wheel_depth" data-label="Range"></div>
      </div>
    </div>
  </div>

  <!-- Row 4 — keys, voice, the two effects, master. Equal-width. -->
  <div class="row row-4" data-row="4">
    <!-- Keys (0053 / E011): mode selector (Whole/Dual/Split), Upper/Lower
         edit toggle (hidden in Whole), split-point slider over C0..C7 with
         a note-name readout (shown in Split), Reset button. All three
         widgets write non-automatable shared state directly (ADR 0003
         §3/§8) — not param gestures — so they neither echo as automation
         nor record a knob move. Custom JS layout (`keysPanel`), not the
         generic `data-control` dispatcher: none of these are params. -->
    <div class="panel" data-name="Keys">
      <div class="panel-header">KEYS</div>
      <div class="panel-body keys-body"></div>
    </div>
    <!-- Voice (0045): AssignMode with display order Poly/Twin/Unison/Solo (the
         descriptor's natural order is Poly/Unison/Solo/Twin, so the cell carries
         the display permutation via `data-order`); Detune with its mode-aware
         top (50 ct Unison, 20 ct Twin) and the Legato toggle drawn beneath the
         fader; Glide fader (0 = off). Legato is *not* its own column — the
         detune-legato primitive handles both params. -->
    <div class="panel" data-name="Voice" data-layered>
      <div class="panel-header">VOICE</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="assign_mode" data-label="Assign" data-order="0,3,1,2"></div>
        <div class="ctl" data-control="detune-legato" data-param="unison_detune" data-label="Detune" data-legato-param="legato" data-mode-param="assign_mode"></div>
        <div class="ctl" data-control="fader" data-param="portamento_time" data-label="Glide"></div>
      </div>
    </div>
    <!-- Chorus (0045): header switch (chorus_on) + Rate/Depth/Mix faders. -->
    <div class="panel" data-name="Chorus" data-header-toggle>
      <div class="panel-header">
        <div class="panel-header-toggle-slot" data-control="header-switch" data-param="chorus_on"></div>
        <div class="panel-header-title">CHORUS</div>
      </div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="chorus_rate" data-label="Rate"></div>
        <div class="ctl" data-control="fader" data-param="chorus_depth" data-label="Depth"></div>
        <div class="ctl" data-control="fader" data-param="chorus_mix" data-label="Mix"></div>
      </div>
    </div>
    <!-- Delay (0045): header switch (delay_on); Time fader host-syncs the same
         way the LFO rate fader does (sync_partner pairs delay_time/delay_sync),
         FB + Mix faders; Sync + Ping-Pong drop to the strip per
         `vxn_ui_vizia::in_bottom_strip`. -->
    <div class="panel" data-name="Delay" data-header-toggle>
      <div class="panel-header">
        <div class="panel-header-toggle-slot" data-control="header-switch" data-param="delay_on"></div>
        <div class="panel-header-title">DELAY</div>
      </div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="delay_time" data-label="Time"></div>
        <div class="ctl" data-control="fader" data-param="delay_feedback" data-label="FB"></div>
        <div class="ctl" data-control="fader" data-param="delay_mix" data-label="Mix"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="delay_sync" data-label="Sync"></div>
        <div class="ctl-strip" data-control="switch" data-param="delay_pingpong" data-label="P-Pong"></div>
      </div>
    </div>
    <!-- Reverb (E012 / 0058): MN3011-style BBD tap-comb. Macro UI — Type
         (Plate/Room/Hall/Large) + Depth + Mix. Header switch matches the
         Chorus/Delay idiom. See epic E012 for the macro mapping. -->
    <div class="panel" data-name="Reverb" data-header-toggle>
      <div class="panel-header">
        <div class="panel-header-toggle-slot" data-control="header-switch" data-param="reverb_on"></div>
        <div class="panel-header-title">REVERB</div>
      </div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="reverb_type" data-label="Type"></div>
        <div class="ctl" data-control="fader" data-param="reverb_depth" data-label="Depth"></div>
        <div class="ctl" data-control="fader" data-param="reverb_mix" data-label="Mix"></div>
      </div>
    </div>
    <!-- Master (0045): Tune/Volume faders in the body; Oversample (4 enum
         variants: O/S OFF / 2x / 4x / 8x) renders as a horizontal row of
         labelled toggles at the bottom of the panel (matches
         `vxn_ui_vizia::in_bottom_strip` for Oversample), with the Limit
         switch stacked underneath in its own row. The vertical strip
         layout overrides the panel-strip's default `flex-direction: row`
         (see `.master-strip` below). -->
    <div class="panel" data-name="Master">
      <div class="panel-header">MASTER</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="master_tune" data-label="Tune"></div>
        <div class="ctl" data-control="fader" data-param="master_volume" data-label="Volume"></div>
      </div>
      <div class="panel-strip master-strip">
        <div class="ctl-strip" data-control="switch" data-param="oversample" data-label="OvSmp"></div>
        <div class="ctl-strip" data-control="switch" data-param="limiter_on" data-label="Limit"></div>
      </div>
    </div>
  </div>

</div>


<script>
__BRIDGE_JS__
__BROWSER_JS__
__PANELS_JS__
__DISPATCH_JS__
</script>
</body>
</html>

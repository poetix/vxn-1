<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VXN1</title>
<style>
/* Faceplate scaffold (0040). Mirrors the vizia editor's geometry from
   `target/vxn-layout.jsonl`: 1024×772 logical, 10px outer padding, 8px
   vertical gap between banner / preset-bar / 4×156 rows, 6px horizontal
   gap between panels in a row. CSS vars are named after the vxn-ui Rust
   constants so the mapping stays obvious; pixel literals stay out of
   selectors so a future resize policy is one variable change. */
:root {
  /* Palette (matches vxn-ui-vizia's STYLE block). */
  --face-bg: #2b2b2b;
  --panel-bg: #1c1c1c;
  --panel-border: #0e0e0e;
  --panel-corner: 4px;
  --header-bg: #a7cfe2;
  --header-fg: #141414;
  --banner-fg: #a7cfe2;
  --text: #d6d6d6;
  --ctl-label: #aeaeae;
  --ctl-value: #d9701b;          /* orange readout — Vizia .ctl-value */
  --track-bg: #0e0e0e;
  --track-fill: #d9701b;
  --thumb-bg: #c4c4c4;
  --thumb-border: #a7cfe2;       /* matches --glyph-active / --knob-indicator */
  --glyph: #888888;
  --glyph-active: #a7cfe2;
  --knob-face: #2a2a2a;
  --knob-rim: #444444;
  --knob-dimple: #222222;
  --knob-dimple-rim: #333333;
  --knob-indicator: #a7cfe2;       /* matches --glyph-active */

  /* Geometry (matches vxn-ui-vizia's PANEL_H / FADER_H / COL_H / DIAL plus
     row + chrome heights derived from `target/vxn-layout.jsonl`). */
  --editor-w: 1024px;
  --pad-outer: 10px;
  --banner-h: 26px;
  --preset-bar-h: 30px;
  --panel-h: 156px;           /* PANEL_H */
  --col-h: 120px;             /* COL_H — per-control column inside a panel */
  --fader-h: 74px;            /* FADER_H — fader travel */
  --dial: 62px;               /* DIAL — selector-knob box */
  --panel-pad: 5px;
  --panel-vgap: 4px;
  --row-vgap: 8px;
  --row-hgap: 6px;
  --header-h: 16px;
  --header-toggle-slot: 16px; /* reserves the Chorus/Delay header switch (0045) */
  --ctl-label-h: 12px;
  --ctl-value-h: 12px;
  --ctl-gap: 2px;
  --fader-track-w: 4px;
  --thumb-w: 18px;
  --thumb-h: 8px;
  --wave-knob-size: 64px;     /* matches the prototype's "Compact" variant */
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--face-bg);
  color: var(--text);
  font-family: "IBM Plex Sans Condensed", -apple-system, system-ui, sans-serif;
  /* Disable text selection across the faceplate — knobs / faders behave more
     like physical controls than text. */
  user-select: none;
  -webkit-user-select: none;
}

.faceplate {
  width: var(--editor-w);
  box-sizing: border-box;
  padding: var(--pad-outer);
  display: flex;
  flex-direction: column;
  gap: var(--row-vgap);
}

.banner {
  height: var(--banner-h);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  color: var(--banner-fg);
  font-size: 16px;
  letter-spacing: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Preset bar (0049). Sits in the 30px row between banner and Row 1.
   Carries the current preset name, prev/next walker buttons over the
   combined Factory+User list, a Browse toggle (binds to 0050's browser
   panel), and a Save As button (opens the 0048 floating popup). The
   status chip is the same `.status-pill` primitive 0046 introduced —
   re-anchored from the lower-right corner to the right of the name
   (ticket §Notes). */
.preset-bar-slot {
  height: var(--preset-bar-h);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 6px;
  box-sizing: border-box;
  color: var(--text);
}
.pbar-btn {
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 2px;
  color: var(--ctl-label);
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  height: 18px;
  cursor: pointer;
  user-select: none;
}
.pbar-btn:hover { border-color: var(--glyph-active); color: #ececec; }
.pbar-btn.active {
  background: #1f9cff;
  border-color: #84cdff;
  color: #fff;
}
.pbar-step { padding: 0 6px; min-width: 18px; text-align: center; }
.pbar-name {
  font-size: 12px;
  color: var(--ctl-value);
  font-weight: 600;
  letter-spacing: 0.5px;
  min-width: 150px;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.pbar-spacer { flex: 1 1 auto; }

/* Preset browser panel (0050). Floats inside the faceplate document, just
   below the preset bar. Outside-click + ESC dismiss. Width sized to keep
   long preset names readable without dominating the row beneath it; height
   capped so it never reaches Row 4 even when the corpus is dense — content
   scrolls inside each pane. The container's `.hoverable` doesn't matter
   here (no Vizia rules in play), and `pointer-events: none` on the
   anchored `position: relative` ancestor would be wrong anyway: clicks
   inside the panel must work. */
.faceplate { position: relative; }
/* The `hidden` HTML attribute maps to UA `display: none`, but a class-set
   `display: flex` on the panel beats it. Promote `[hidden]` explicitly so
   the bootstrap-time render isn't visible before `setOpen(false)` would
   normally hide it. */
.browser-panel[hidden],
.browser-backdrop[hidden] { display: none !important; }
.browser-backdrop {
  position: absolute;
  inset: 0;
  z-index: 50;
  /* Invisible — its only job is to swallow outside clicks and dispatch
     them to the close handler. Pointer events stay on so the click lands. */
}
.browser-panel {
  position: absolute;
  top: calc(var(--pad-outer) + var(--banner-h) + var(--row-vgap)
           + var(--preset-bar-h) + var(--row-vgap));
  left: var(--pad-outer);
  width: 760px;
  max-width: calc(var(--editor-w) - 2 * var(--pad-outer));
  height: 420px;
  z-index: 60;
  background: var(--panel-bg);
  border: 1px solid var(--ctl-value);
  border-radius: var(--panel-corner);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
  padding: 8px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.browser-close {
  position: absolute;
  top: 6px;
  right: 8px;
  z-index: 1;
  background: transparent;
  border: none;
  color: var(--ctl-label);
  font: inherit;
  font-size: 14px;
  line-height: 1;
  padding: 2px 4px;
  cursor: pointer;
  user-select: none;
}
.browser-close:hover { color: #ececec; }
.browser-search {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 22px;
  flex: 0 0 auto;
  padding-right: 22px; /* keep the search clear button clear of the close-X */
}
.browser-search input {
  flex: 1 1 auto;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  color: var(--text);
  font: inherit;
  font-size: 12px;
  height: 22px;
  padding: 0 6px;
  box-sizing: border-box;
  outline: none;
}
.browser-search input:focus { border-color: var(--glyph-active); }
.browser-panes {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  gap: 6px;
}
.browser-pane {
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  overflow-y: auto;
  padding: 2px;
  box-sizing: border-box;
}
.browser-pane-folders { width: 220px; flex: 0 0 220px; }
.browser-pane-presets { flex: 1 1 auto; }
.browser-section {
  font-size: 9px;
  color: var(--ctl-value);
  letter-spacing: 1px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 6px 4px 4px;
  height: 22px;
  box-sizing: border-box;
  display: flex;
  align-items: flex-end;
}
.browser-row {
  font-size: 12px;
  color: var(--text);
  padding: 3px 8px;
  border-radius: 2px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 16px;
}
.browser-row:hover { background: #1c1c1c; }
.browser-row.selected {
  background: #1c1c1c;
  color: #ececec;
  box-shadow: inset 2px 0 0 var(--ctl-value);
}
.browser-row.current {
  color: var(--ctl-value);
  font-weight: 600;
}
/* Search-mode rows lay out as `name + muted origin label` so cross-folder
   matches don't read as ambiguous duplicates ("Brassy" in Factory/Lead
   vs. user/Bass). The origin pushes right. */
.browser-row.search-row { display: flex; align-items: baseline; gap: 8px; }
.browser-row.search-row .browser-row-name {
  flex: 1 1 auto;
  overflow: hidden;
  text-overflow: ellipsis;
}
.browser-row.search-row .browser-row-origin {
  flex: 0 0 auto;
  font-size: 10px;
  color: var(--ctl-label);
  letter-spacing: 0.3px;
}
.browser-empty {
  font-size: 11px;
  color: var(--ctl-label);
  padding: 8px;
  font-style: italic;
}
/* "+ New" button mounted inline with the User section header (0051). The
   section header is normally `display: flex; align-items: flex-end;` —
   the button rides the right edge of that row. */
.browser-section-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-right: 4px;
}
.browser-section-row .browser-section { flex: 1 1 auto; padding-right: 0; }
.browser-new-folder {
  flex: 0 0 auto;
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 2px;
  color: var(--ctl-label);
  font: inherit;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 1px 5px;
  height: 16px;
  cursor: pointer;
  user-select: none;
  margin-bottom: 4px;
}
.browser-new-folder:hover { border-color: var(--glyph-active); color: #ececec; }

/* Right-click context menu (0051). Mounts inside the browser panel as a
   sibling of the panes; absolutely positioned at the click coordinates
   (relative to the panel). The "Move to ▸" submenu is a child of its row,
   shown on hover via CSS — no JS state for hover open. */
.browser-menu {
  position: absolute;
  z-index: 70;
  background: #1c1c1c;
  border: 1px solid var(--ctl-value);
  border-radius: 2px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  padding: 2px 0;
  min-width: 120px;
}
.browser-menu-item {
  position: relative;
  font-size: 12px;
  color: var(--text);
  padding: 4px 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.browser-menu-item:hover { background: #2a2a2a; }
.browser-menu-item.has-submenu::after {
  content: '▸';
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ctl-label);
  font-size: 10px;
}
.browser-submenu {
  display: none;
  position: absolute;
  left: 100%;
  top: -3px;
  background: #1c1c1c;
  border: 1px solid var(--ctl-value);
  border-radius: 2px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  padding: 2px 0;
  min-width: 120px;
  max-height: 240px;
  overflow-y: auto;
}
.browser-menu-item.has-submenu:hover > .browser-submenu { display: block; }
.browser-submenu-item {
  font-size: 12px;
  color: var(--text);
  padding: 4px 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.browser-submenu-item:hover { background: #2a2a2a; }
.browser-submenu-empty {
  font-size: 11px;
  color: var(--ctl-label);
  padding: 4px 12px;
  font-style: italic;
}
/* Confirm modal (0051). Centred inside the browser panel; backdrop
   absorbs clicks so the panel beneath isn't dismissed by a confirm-click.
   Replaces the Vizia version's two-click row-armed pattern (the right-
   click menu obscured the row text under it). */
.browser-modal-backdrop {
  position: absolute;
  inset: 0;
  z-index: 80;
  background: rgba(0, 0, 0, 0.55);
}
.browser-modal {
  position: absolute;
  z-index: 81;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1c1c1c;
  border: 1px solid var(--ctl-value);
  border-radius: var(--panel-corner);
  box-shadow: 0 8px 22px rgba(0, 0, 0, 0.6);
  padding: 14px 18px;
  min-width: 260px;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.browser-modal-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--ctl-value);
}
.browser-modal-body {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
  word-break: break-word;
}
.browser-modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}
.browser-modal-btn {
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 2px;
  color: var(--ctl-label);
  font: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  cursor: pointer;
  user-select: none;
}
.browser-modal-btn:hover { border-color: var(--glyph-active); color: #ececec; }
.browser-modal-btn.danger {
  border-color: #ff5050;
  color: #ff7676;
}
.browser-modal-btn.danger:hover {
  background: #2a1414;
  color: #ffb0b0;
}
.browser-modal-btn.disabled,
.browser-modal-btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}
/* Save As modal form: two-row label + control grid. */
.save-as-body { display: flex; flex-direction: column; gap: 8px; min-width: 320px; }
.save-as-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.save-as-label {
  flex: 0 0 56px;
  font-size: 10px;
  color: var(--ctl-label);
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.save-as-name {
  flex: 1 1 auto;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.save-as-name.placeholder { color: var(--ctl-label); font-style: italic; }
.save-as-select {
  flex: 1 1 auto;
  background: #0e0e0e;
  border: 1px solid #2a2a2a;
  border-radius: 2px;
  color: var(--text);
  font: inherit;
  font-size: 12px;
  height: 24px;
  padding: 0 6px;
  cursor: pointer;
}
.save-as-select:focus { outline: none; border-color: var(--glyph-active); }

.row {
  display: flex;
  gap: var(--row-hgap);
  height: var(--panel-h);
}

.panel {
  position: relative;             /* anchor for absolutely-placed .panel-strip */
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-corner);
  padding: var(--panel-pad);
  display: flex;
  flex-direction: column;
  gap: var(--panel-vgap);
  min-width: 0;
  flex: 1 1 0;
  box-sizing: border-box;
}

.panel[data-layered] {}

/* Per-row stretch shares — pulled from `panel_view`'s `match title` block
   in `crates/vxn-ui-vizia/src/lib.rs`. flex-basis is 0 so `flex-grow`
   gives a pure ratio. Bend is the only fixed-width panel. */
.row-1 .panel[data-name="LFO 1"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="LFO 2"]  { flex-grow: 0.7; }
.row-1 .panel[data-name="Osc 1"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="Osc 2"]  { flex-grow: 1.2; }
.row-1 .panel[data-name="Mixer"]  { flex-grow: 1.1; }

.row-2 .panel[data-name="Env 1"]      { flex-grow: 0.8; }
.row-2 .panel[data-name="Env 2"]      { flex-grow: 0.8; }
.row-2 .panel[data-name="VCA"]        { flex-grow: 0.75; }
.row-2 .panel[data-name="Filter"]     { flex-grow: 1.15; }
.row-2 .panel[data-name="Filter Mod"] { flex-grow: 1.0; }

.row-3 .panel[data-name="Bend"] { flex: 0 0 54px; }

.panel-header {
  height: var(--header-h);
  background: var(--header-bg);
  color: var(--header-fg);
  border-radius: 2px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
}

.panel[data-header-toggle] .panel-header {
  justify-content: flex-start;
  padding-left: 3px;
  gap: 4px;
}
.panel[data-header-toggle] .panel-header-toggle-slot {
  width: var(--header-toggle-slot);
  height: var(--header-toggle-slot);
  flex: 0 0 var(--header-toggle-slot);
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel[data-header-toggle] .panel-header-title {
  flex: 1 1 auto;
  text-align: center;
  margin-right: var(--header-toggle-slot);
}

.panel-body {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  gap: 4px;
  align-items: stretch;
  justify-content: space-evenly;
}

/* ── Control primitives (0041) ──────────────────────────────────────────── */

/* Common cell — a vertical stack of label, control, value. */
.ctl {
  position: relative;          /* anchor for the absolute .ctl-value popup */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}

.ctl-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-label);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  height: var(--ctl-label-h);
  line-height: var(--ctl-label-h);
}

/* Floating value popup — one shared <div> across every control, anchored
   at the pointer's entry / grab point in fixed coords so it floats above
   the layout and can never push siblings around. Style matches the vizia
   editor's `.value-pop` (dark fill, orange border). */
.value-pop {
  position: fixed;
  display: none;
  pointer-events: none;
  background: #0e0e0e;
  border: 1px solid var(--ctl-value);
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 10px;
  color: #f6f6f6;
  white-space: nowrap;
  z-index: 1000;
}

/* Status pill (0046) — inline chip in the preset bar, right of the
   current name (0049 §Notes). Driven by the controller's `Status { line }`
   ViewEvent (clamp warnings on preset load, save / load messages). Fades
   after ~3s; pure CSS animation so the JS side just sets the line and
   toggles the `visible` class. */
.status-pill {
  background: #0e0e0e;
  border: 1px solid var(--glyph-active);
  border-radius: 3px;
  padding: 2px 8px;
  font-size: 10px;
  color: #f6f6f6;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 240ms ease-out;
}
.status-pill.visible { opacity: 1; }

/* Fader — vertical track + thumb. Pointer ops issue Begin/EndGesture
   brackets so the host's automation lane records as one event, not a
   pixel storm. */
.ctl-fader {
  position: relative;
  width: var(--thumb-w);
  height: var(--fader-h);
  cursor: ns-resize;
  /* Hit area extends slightly past the track so a near-miss still grabs. */
  touch-action: none;
}
.ctl-fader-track {
  position: absolute;
  left: calc((var(--thumb-w) - var(--fader-track-w)) / 2);
  top: 0;
  width: var(--fader-track-w);
  height: 100%;
  background: var(--track-bg);
  border-radius: 2px;
  /* Centre tick — useful on bipolar params (coarse, fine, etc.) but harmless
     on unipolar (the tick lands exactly at 0.5 either way). */
}
.ctl-fader-track::before {
  content: '';
  position: absolute;
  left: -3px;
  right: -3px;
  top: 50%;
  height: 1px;
  background: #3a3a3a;
}
.ctl-fader-thumb {
  position: absolute;
  left: 0;
  width: var(--thumb-w);
  height: var(--thumb-h);
  background: var(--thumb-bg);
  border: 1px solid var(--thumb-border);
  border-radius: 1px;
  transform: translateY(-50%);
  top: 50%;
  pointer-events: none;
  box-shadow: 0 0 4px rgba(255, 255, 255, 0.15);
}
.ctl-fader.dragging .ctl-fader-thumb {
  box-shadow: 0 0 6px var(--ctl-value);
}

/* Rotary waveform selector (0041). SVG-based: knob face + rotating
   indicator + glyph labels arranged at the corners (SW/NW/NE/SE) outside
   the rim. All visuals + hit-testing live in the SVG; no DOM children to
   reflow. Layout stability comes for free — the dial occupies a fixed
   square (--wave-knob-size) regardless of state. */
.ctl-wave {
  width: var(--wave-knob-size);
  height: var(--wave-knob-size);
  cursor: grab;
  touch-action: none;
}
.ctl-wave.dragging { cursor: grabbing; }

/* Bottom strip — selector/toggle controls (NoiseColor, FilterSlope, etc.)
   relocated into the panel's free clearance below the main column row.
   Absolutely placed so it never grows the panel or competes with ctl
   columns for flex space. Mirrors the vizia editor's strip placement
   (left: 8px, bottom: 4px). */
.panel-strip {
  position: absolute;
  left: 8px;
  bottom: 4px;
  right: 5px;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  pointer-events: none;           /* empty space passes through to body */
}
.panel-strip > * { pointer-events: auto; }

/* Master's strip stacks Oversample (horizontal toggle row) over Limit
   (single toggle) — `panel-strip` defaults to a single horizontal row,
   so this is the one panel that overrides it. */
.master-strip {
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
}

/* Toggle row — small box + inline label. Matches vizia .tg-row /
   .tg-box / .tg-lbl exactly (#1f9cff active fill, 9×9 box, 7 px label). */
.ctl-tg-row {
  display: inline-flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.ctl-tg-box {
  width: 11px;
  height: 11px;
  background: #4a4a4a;
  border: 1px solid #8a8a8a;
  border-radius: 2px;
  box-sizing: border-box;
}
.ctl-tg-row:hover .ctl-tg-box { border-color: #c4c4c4; }
.ctl-tg-row.active .ctl-tg-box {
  background: #1f9cff;
  border-color: #84cdff;
  box-shadow: 0 0 6px #36b3ff;
}
.ctl-tg-lbl {
  font-size: 9px;
  color: #9a9a9a;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 700;
}
.ctl-tg-row.active .ctl-tg-lbl { color: #ececec; }

/* ButtonGroup — rendered exactly like a strip of toggles (same `.ctl-tg-row`
   children) but inside a normal column with a label on top. Used for
   Oversample / CrossModType / AssignMode. */
.ctl-buttongroup {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
}
.ctl-buttongroup .ctl-tg-rows {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-start;
}

/* Dropdown — native <select> styled to match the dark palette. Fallback for
   enums that don't fit ButtonGroup (too many variants, or a long name list). */
.ctl-dropdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
}
.ctl-dropdown select {
  background: #1c1c1c;
  color: var(--text);
  border: 1px solid #444;
  border-radius: 2px;
  font-family: inherit;
  font-size: 10px;
  padding: 1px 4px;
}
.ctl-dropdown select:focus { outline: 1px solid var(--ctl-value); }

/* Dimmed — applied to control cells whose param is gated by a sibling
   (LFO 1's Delay/Fade dim while Free is on; Filter Slope dims when the
   mode is Notch, where the DSP's `FilterMode::mix` ignores slope, see
   vxn-dsp/src/ota_ladder.rs). Visual-only: pointer events still pass
   through so DAW automation echoes still move the thumb. Same selector
   covers both panel-body (`.ctl`) and panel-strip (`.ctl-strip`)
   mounts. */
.ctl.dimmed, .ctl-strip.dimmed, .route-col.dimmed { opacity: 0.4; }

/* Mod-route column (0044): one column header (LFO / Env) over a
   horizontal pair — source selector on the left, depth fader on the
   right — mirroring vxn_ui_vizia's `mod_route_view`. The child
   buttongroup omits its own label (kept structurally for the variant
   rows) since the route header already names the source. */
.route-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}
.route-col-head {
  font-size: 10px;
  font-weight: 700;
  color: var(--ctl-label);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  height: var(--ctl-label-h);
  line-height: var(--ctl-label-h);
}
.route-col-body {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 6px;
}
.route-col .ctl {
  height: auto;
}

/* Header-switch box (Chorus / Delay, 0045) — a small toggle child of
   `.panel-header-toggle-slot`. Sized to sit *inside* the 16 px header
   bar, not fill it, so the box reads as a control on the header rather
   than the header's whole left edge. Palette matches `.ctl-tg-box` but
   the inactive border picks up a header-tinted shade so it reads as
   part of the header chrome. */
.panel-header-switch {
  width: 10px;
  height: 10px;
  background: #4a4a4a;
  border: 1px solid #2c4a59;
  border-radius: 2px;
  box-sizing: border-box;
  cursor: pointer;
}
.panel-header-switch:hover { border-color: #141414; }
.panel-header-switch.active {
  background: #1f9cff;
  border-color: #84cdff;
  box-shadow: 0 0 6px #36b3ff;
}

/* Voice panel's Detune column — a normal fader on top with the Legato
   toggle beneath it (level with the Solo row in the assign list), so the
   whole column keeps the same width as a plain fader column (0045). */
.ctl-detune {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--ctl-gap);
  height: var(--col-h);
  min-width: 0;
}
.ctl-detune-body {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.ctl-detune-legato { margin-top: 4px; }
.ctl-detune-legato.disabled { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>
<div class="faceplate" id="faceplate">

  <div class="banner">VULPUS LABS &mdash; VXN-1</div>

  <!-- Preset bar (0049). Prev/next walk the combined Factory + User
       list (controller-side via UiEvent::StepPreset); Browse toggles a
       view-side `browserOpen` flag 0050 will bind a panel to; Save As
       opens the 0048 floating popup, commits with `folder: null`
       (defaults to user root until 0051 ties browser selection in). -->
  <div class="preset-bar-slot" id="preset-bar-slot">
    <button class="pbar-btn pbar-step" id="pbar-prev" type="button" aria-label="Previous preset">&lt;</button>
    <div class="pbar-name" id="pbar-name"></div>
    <button class="pbar-btn pbar-step" id="pbar-next" type="button" aria-label="Next preset">&gt;</button>
    <button class="pbar-btn" id="pbar-browse" type="button">Browse</button>
    <button class="pbar-btn" id="pbar-save" type="button">Save As</button>
    <div class="pbar-spacer"></div>
    <div class="status-pill" id="pbar-status"></div>
  </div>

  <!-- Preset browser panel (0050). Two-pane folders / presets list with a
       case-insensitive substring search across the selected folder. Hidden
       until the preset bar's Browse toggle flips on; populated from the
       controller's corpus snapshot pushed via
       `window.__vxn.applyPresetCorpus`. -->
  <div class="browser-backdrop" id="browser-backdrop" hidden></div>
  <div class="browser-panel" id="browser-panel" hidden>
    <button class="browser-close" id="browser-close" type="button" aria-label="Close browser">&times;</button>
    <div class="browser-search">
      <input type="text" id="browser-search-input" placeholder="Search…" autocomplete="off" />
      <button class="pbar-btn" id="browser-search-clear" type="button" aria-label="Clear search">x</button>
    </div>
    <div class="browser-panes">
      <div class="browser-pane browser-pane-folders" id="browser-folders"></div>
      <div class="browser-pane browser-pane-presets" id="browser-presets"></div>
    </div>
  </div>

  <!-- Row 1 — LFOs, oscillators, mixer. -->
  <div class="row row-1" data-row="1">
    <!-- LFO 1 (0042): per-voice. Shape (rotary) + Rate/Delay/Fade faders in
         the main row; Sync + Free toggles in the bottom strip (matches the
         vizia layout via `in_bottom_strip`). Free is a quirk — when on, it
         keeps the LFO free-running and the Delay/Fade cells dim. -->
    <div class="panel" data-name="LFO 1" data-layered>
      <div class="panel-header">LFO 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo_rate" data-label="Rate"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_delay_time" data-label="Delay"></div>
        <div class="ctl" data-control="fader" data-param="lfo1_fade" data-label="Fade"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo_sync" data-label="Sync"></div>
        <div class="ctl-strip" data-control="switch" data-param="lfo1_free_run" data-label="Free"></div>
      </div>
    </div>
    <!-- LFO 2 (0042): one global oscillator. Shape + Rate up top, Sync in
         the strip. Not layer-aware — params come from GLOBAL_PARAMS. -->
    <div class="panel" data-name="LFO 2">
      <div class="panel-header">LFO 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="lfo2_shape" data-label="Shape"></div>
        <div class="ctl" data-control="fader" data-param="lfo2_rate" data-label="Rate"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="lfo2_sync" data-label="Sync"></div>
      </div>
    </div>
    <!-- Osc 1 (0041): Wave (rotary) + 4 faders. Layer hard-bound to Upper —
         the edit-layer toggle lands with the Voice panel in 0045. The faders
         resolve by descriptor name, not CLAP id, so a `vxn_app::PatchParam`
         reorder doesn't desync the HTML. -->
    <div class="panel" data-name="Osc 1" data-layered>
      <div class="panel-header">OSC 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc1_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc1_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc1_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc1_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc1_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Osc 2 (0041a): identical control set to Osc 1, different param IDs. -->
    <div class="panel" data-name="Osc 2" data-layered>
      <div class="panel-header">OSC 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="wave" data-param="osc2_wave" data-label="Wave"></div>
        <div class="ctl" data-control="fader" data-param="osc2_octave" data-label="Oct"></div>
        <div class="ctl" data-control="fader" data-param="osc2_coarse" data-label="Semi"></div>
        <div class="ctl" data-control="fader" data-param="osc2_fine" data-label="Fine"></div>
        <div class="ctl" data-control="fader" data-param="osc2_pw" data-label="PW"></div>
      </div>
    </div>
    <!-- Mixer (0041a): four level faders + Col (White/Pink) switch in the
         bottom strip. NoiseColor is a 2-variant enum; the Switch primitive
         renders it as two exclusive labelled toggles. -->
    <div class="panel" data-name="Mixer" data-layered>
      <div class="panel-header">MIXER</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="osc1_level" data-label="Osc1"></div>
        <div class="ctl" data-control="fader" data-param="osc2_level" data-label="Osc2"></div>
        <div class="ctl" data-control="fader" data-param="ring_level" data-label="Ring"></div>
        <div class="ctl" data-control="fader" data-param="noise_level" data-label="Noise"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="noise_color" data-label="Col"></div>
      </div>
    </div>
  </div>

  <!-- Row 2 — envelopes, filter, filter mod. -->
  <div class="row row-2" data-row="2">
    <!-- Env 1 (0043): ADSR + Shape (Lin/Exp) in the strip. Vizia maps the
         2-variant Shape enum to a switch and routes it through the bottom
         strip alongside FilterSlope etc. -->
    <div class="panel" data-name="Env 1" data-layered>
      <div class="panel-header">ENV 1</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="env1_attack" data-label="A"></div>
        <div class="ctl" data-control="fader" data-param="env1_decay" data-label="D"></div>
        <div class="ctl" data-control="fader" data-param="env1_sustain" data-label="S"></div>
        <div class="ctl" data-control="fader" data-param="env1_release" data-label="R"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env1_shape" data-label="Shape"></div>
      </div>
    </div>
    <div class="panel" data-name="Env 2" data-layered>
      <div class="panel-header">ENV 2</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="env2_attack" data-label="A"></div>
        <div class="ctl" data-control="fader" data-param="env2_decay" data-label="D"></div>
        <div class="ctl" data-control="fader" data-param="env2_sustain" data-label="S"></div>
        <div class="ctl" data-control="fader" data-param="env2_release" data-label="R"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="env2_shape" data-label="Shape"></div>
      </div>
    </div>
    <!-- VCA (0043): AmpLfoSrc selects the tremolo source — vizia renders
         `Ctl::Select` via `enum_list_body` (vertical stack of labelled
         toggles), same shape as `Ctl::Buttons` (Oversample, AssignMode).
         Map to our `buttongroup` primitive. Depth scales the source. Gate
         (AmpEnvBypass) drops to the strip. -->
    <div class="panel" data-name="VCA" data-layered>
      <div class="panel-header">VCA</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="amp_lfo_src" data-label="LFO"></div>
        <div class="ctl" data-control="fader" data-param="amp_lfo_depth" data-label="Depth" data-dim-when-src-off="amp_lfo_src"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="amp_env_bypass" data-label="Gate"></div>
      </div>
    </div>
    <!-- Filter (0043): HPF/Cutoff/Reso/Drive faders + Mode button group
         (vizia's `Ctl::Select` for FilterMode renders as a labelled-toggle
         stack via `enum_list_body`). Slope (12/24 dB) and KeyTrk (bool)
         are strip switches per `in_bottom_strip`. -->
    <div class="panel" data-name="Filter" data-layered>
      <div class="panel-header">FILTER</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="hpf_cutoff" data-label="HPF"></div>
        <div class="ctl" data-control="fader" data-param="cutoff" data-label="Cutoff"></div>
        <div class="ctl" data-control="fader" data-param="resonance" data-label="Reso"></div>
        <div class="ctl" data-control="fader" data-param="drive" data-label="Drive"></div>
        <div class="ctl" data-control="buttongroup" data-param="filter_mode" data-label="Mode"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="filter_slope" data-label="Slope"></div>
        <div class="ctl-strip" data-control="switch" data-param="filter_key_track" data-label="KeyTrk"></div>
      </div>
    </div>
    <!-- Filter Mod (0043): four fixed-source depths into cutoff (E006: no
         source selectors). Plain four-fader row. -->
    <div class="panel" data-name="Filter Mod" data-layered>
      <div class="panel-header">FILTER MOD</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="vel_cutoff_depth" data-label="Vel"></div>
        <div class="ctl" data-control="fader" data-param="cutoff_lfo1_depth" data-label="LFO1"></div>
        <div class="ctl" data-control="fader" data-param="cutoff_lfo2_depth" data-label="LFO2"></div>
        <div class="ctl" data-control="fader" data-param="cutoff_env_depth" data-label="Env1"></div>
      </div>
    </div>
  </div>

  <!-- Row 3 — per-osc mod routes + performance wheels (Bend is fixed-width). -->
  <div class="row row-3" data-row="3">
    <!-- Pitch Mod (0044): two route columns. Each column = one header
         (LFO / Env) over a horizontal pair: source buttongroup left,
         depth fader right (matches vxn_ui_vizia's `mod_route_view`). The
         source buttongroup carries `data-no-label` (route header is the
         only column label) and stays full-opacity so a routed-Off path
         is still readable + clickable; the *depth fader* dims via
         `data-dim-when-src-off` when its source reads Off (variant 0),
         signalling that the slider does nothing right now. -->
    <div class="panel" data-name="Pitch Mod" data-layered>
      <div class="panel-header">PITCH MOD</div>
      <div class="panel-body">
        <div class="route-col">
          <div class="route-col-head">LFO</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pitch_lfo_src" data-label="LFO" data-no-label></div>
            <div class="ctl" data-control="fader" data-param="pitch_lfo_depth" data-label="Depth" data-dim-when-src-off="pitch_lfo_src"></div>
          </div>
        </div>
        <div class="route-col">
          <div class="route-col-head">Env</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pitch_env_src" data-label="Env" data-no-label></div>
            <div class="ctl" data-control="fader" data-param="pitch_env_depth" data-label="Depth" data-dim-when-src-off="pitch_env_src"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel" data-name="PWM Mod" data-layered>
      <div class="panel-header">PWM MOD</div>
      <div class="panel-body">
        <div class="route-col">
          <div class="route-col-head">LFO</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pwm_lfo_src" data-label="LFO" data-no-label></div>
            <div class="ctl" data-control="fader" data-param="pwm_lfo_depth" data-label="Depth" data-dim-when-src-off="pwm_lfo_src"></div>
          </div>
        </div>
        <div class="route-col">
          <div class="route-col-head">Env</div>
          <div class="route-col-body">
            <div class="ctl" data-control="buttongroup" data-param="pwm_env_src" data-label="Env" data-no-label></div>
            <div class="ctl" data-control="fader" data-param="pwm_env_depth" data-label="Depth" data-dim-when-src-off="pwm_env_src"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- Cross Mod (0044): two selector/fader pairs. Type {Off/Sync/FM} sits
         beside its Amount fader (Amount only drives FM/PM depth — dims for
         anything other than FM, matching vxn-ui-vizia's xmod_pair); Src
         {Off/Env1/Env2} sits beside its Mod depth fader (dims on Off, same
         rule as the route columns).
         The descriptor labels Pulse-Modulation as "FM" — players expect that
         name (ADR 0004 §3); the ticket's "Off/Sync/PM" maps onto the same
         three variants. -->
    <div class="panel" data-name="Cross Mod" data-layered>
      <div class="panel-header">CROSS MOD</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="cross_mod_type" data-label="Type"></div>
        <div class="ctl" data-control="fader" data-param="cross_mod_amount" data-label="Amt" data-dim-unless-fm="cross_mod_type"></div>
        <div class="ctl" data-control="buttongroup" data-param="osc2_pitch_env_src" data-label="Src"></div>
        <div class="ctl" data-control="fader" data-param="osc2_pitch_env_depth" data-label="Mod" data-dim-when-src-off="osc2_pitch_env_src"></div>
      </div>
    </div>
    <div class="panel" data-name="Mod Wheel" data-layered>
      <div class="panel-header">MOD WHEEL</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="mod_wheel_pwm" data-label="PWM"></div>
        <div class="ctl" data-control="fader" data-param="mod_wheel_cutoff" data-label="Cutoff"></div>
        <div class="ctl" data-control="fader" data-param="mod_wheel_reso" data-label="Reso"></div>
        <div class="ctl" data-control="fader" data-param="mod_wheel_osc2_pitch" data-label="O2 Pitch"></div>
      </div>
    </div>
    <!-- Bend (0044): single Range fader (vibrato-scaled semitone range for
         the pitch wheel, both oscillators). Panel pinned to 54px via the
         `.row-3 .panel[data-name="Bend"]` flex rule above. -->
    <div class="panel" data-name="Bend" data-layered>
      <div class="panel-header">BEND</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="pitch_wheel_depth" data-label="Range"></div>
      </div>
    </div>
  </div>

  <!-- Row 4 — keys, voice, the two effects, master. Equal-width. -->
  <div class="row row-4" data-row="4">
    <!-- Keys (E011): still rendered by vizia during the E010 → E011 transition;
         the HTML faceplate just reserves the slot. -->
    <div class="panel" data-name="Keys">
      <div class="panel-header">KEYS</div>
      <div class="panel-body"></div>
    </div>
    <!-- Voice (0045): AssignMode with display order Poly/Twin/Unison/Solo (the
         descriptor's natural order is Poly/Unison/Solo/Twin, so the cell carries
         the display permutation via `data-order`); Detune with its mode-aware
         top (50 ct Unison, 20 ct Twin) and the Legato toggle drawn beneath the
         fader; Glide fader (0 = off). Legato is *not* its own column — the
         detune-legato primitive handles both params. -->
    <div class="panel" data-name="Voice" data-layered>
      <div class="panel-header">VOICE</div>
      <div class="panel-body">
        <div class="ctl" data-control="buttongroup" data-param="assign_mode" data-label="Assign" data-order="0,3,1,2"></div>
        <div class="ctl" data-control="detune-legato" data-param="unison_detune" data-label="Detune" data-legato-param="legato" data-mode-param="assign_mode"></div>
        <div class="ctl" data-control="fader" data-param="portamento_time" data-label="Glide"></div>
      </div>
    </div>
    <!-- Chorus (0045): header switch (chorus_on) + Rate/Depth/Mix faders. -->
    <div class="panel" data-name="Chorus" data-header-toggle>
      <div class="panel-header">
        <div class="panel-header-toggle-slot" data-control="header-switch" data-param="chorus_on"></div>
        <div class="panel-header-title">CHORUS</div>
      </div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="chorus_rate" data-label="Rate"></div>
        <div class="ctl" data-control="fader" data-param="chorus_depth" data-label="Depth"></div>
        <div class="ctl" data-control="fader" data-param="chorus_mix" data-label="Mix"></div>
      </div>
    </div>
    <!-- Delay (0045): header switch (delay_on); Time fader host-syncs the same
         way the LFO rate fader does (sync_partner pairs delay_time/delay_sync),
         FB + Mix faders; Sync + Ping-Pong drop to the strip per
         `vxn_ui_vizia::in_bottom_strip`. -->
    <div class="panel" data-name="Delay" data-header-toggle>
      <div class="panel-header">
        <div class="panel-header-toggle-slot" data-control="header-switch" data-param="delay_on"></div>
        <div class="panel-header-title">DELAY</div>
      </div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="delay_time" data-label="Time"></div>
        <div class="ctl" data-control="fader" data-param="delay_feedback" data-label="FB"></div>
        <div class="ctl" data-control="fader" data-param="delay_mix" data-label="Mix"></div>
      </div>
      <div class="panel-strip">
        <div class="ctl-strip" data-control="switch" data-param="delay_sync" data-label="Sync"></div>
        <div class="ctl-strip" data-control="switch" data-param="delay_pingpong" data-label="P-Pong"></div>
      </div>
    </div>
    <!-- Master (0045): Tune/Volume faders in the body; Oversample (4 enum
         variants: O/S OFF / 2x / 4x / 8x) renders as a horizontal row of
         labelled toggles at the bottom of the panel (matches
         `vxn_ui_vizia::in_bottom_strip` for Oversample), with the Limit
         switch stacked underneath in its own row. The vertical strip
         layout overrides the panel-strip's default `flex-direction: row`
         (see `.master-strip` below). -->
    <div class="panel" data-name="Master">
      <div class="panel-header">MASTER</div>
      <div class="panel-body">
        <div class="ctl" data-control="fader" data-param="master_tune" data-label="Tune"></div>
        <div class="ctl" data-control="fader" data-param="master_volume" data-label="Volume"></div>
      </div>
      <div class="panel-strip master-strip">
        <div class="ctl-strip" data-control="switch" data-param="oversample" data-label="OvSmp"></div>
        <div class="ctl-strip" data-control="switch" data-param="limiter_on" data-label="Limit"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── Bridge bootstrap ──────────────────────────────────────────────────────
//
// `window.vxn.send({op,...})` posts a UiEvent at the controller through wry's
// IPC handler; `window.__vxn.applyViewEvents(arr)` is the batched entry
// point Rust calls via `webview.evaluate_script` once per controller tick
// (0046). `window.vxn.onViewEvent(ev)` is a single-event convenience that
// routes to the same dispatcher — kept for ad-hoc calls and for in-page
// tests.
//
// `window.vxn.params` is the param descriptor table — Rust splices its JSON
// in via the `__PARAMS_JSON__` placeholder below at editor-open time. Keys
// are CLAP ids (numeric); the page builds a name → id index in `init()`.

// Buffer ViewEvents that arrive before `init()` runs. The clack shell's
// CLAP timer (vxn-clap `on_timer`) starts pushing `param_changed` events
// as soon as `set_parent` registers it — that's often before the inline
// `init()` call below has populated the CONTROLS map and rebound the
// dispatcher. Without a buffer the first broadcast (which is the only
// one for params that aren't being automated) is dropped on the floor
// and `lastDisplay` on every fader stays empty until the user wiggles
// something.
const _earlyViewEvents = [];
window.vxn = {
  send: function (msg) {
    try { window.ipc.postMessage(JSON.stringify(msg)); }
    catch (e) { console.warn('vxn.send failed', e); }
  },
  onViewEvent: function (ev) { _earlyViewEvents.push(ev); },
  params: __PARAMS_JSON__,
  // Tempo-sync subdivision labels (coarse → fine). When an LFO rate's sync
  // partner is on, the fader's display reads from this list instead of the
  // descriptor's Hz formatting (0042 / 0015) — mirrors the vizia editor's
  // `sync_partner` override.
  subdivisions: __SUBDIVISIONS_JSON__,
  // Per-patch slot count — used by layer rebinding (0045) to translate an
  // Upper-side CLAP id into its Lower-side twin: Lower id = Upper id +
  // patchCount, for any id under 2 × patchCount.
  patchCount: __PATCH_COUNT__,
};
// Batched bridge entry point. `init()` replaces this with the real dispatcher
// once CONTROLS is built; until then, every event in the batch is buffered.
// `applyPresetCorpus` is the 0050 corpus-snapshot entry point; same buffer
// pattern — the latest snapshot held until the browser panel is alive to
// consume it.
let _earlyPresetCorpus = null;
window.__vxn = {
  applyViewEvents: function (arr) {
    for (const ev of arr) _earlyViewEvents.push(ev);
  },
  applyPresetCorpus: function (snap) { _earlyPresetCorpus = snap; },
};

// ─── Floating text-input popup bridge (0048) ───────────────────────────────
//
// `window.vxn.promptText(title, initial, cb)` posts a `request_text_input`
// UiEvent and stashes `cb` in `_textInputCallbacks` keyed by a fresh id.
// Rust opens a native NSWindow (macOS) outside the host's NSEvent monitor
// scope, so Space and friends work as text input rather than transport.
// On commit / cancel the controller emits a `text_input_result` ViewEvent;
// the dispatcher looks up `id` and fires the matching callback exactly
// once. `value` is `null` on Esc / click outside, a string on Enter.
const _textInputCallbacks = new Map();
let _textInputCounter = 0;
window.vxn.promptText = function (title, initial, cb) {
  const id = 'ti' + (++_textInputCounter);
  _textInputCallbacks.set(id, cb);
  window.vxn.send({
    op: 'request_text_input',
    id,
    title: title || '',
    initial: initial || '',
  });
};

// ─── Floating value popup (single shared instance) ─────────────────────────
//
// One <div> per page, used by every control. Show/update/hide as the
// pointer enters / drags / leaves. Anchored at the pointer's first
// relevant position (entry for hover, grab for drag) so the popup stays
// put while the indicator moves — matches the vizia editor's grabbed-cell
// behaviour. `fixed` positioning + body-level mount means it can't push
// any layout around or be clipped by a panel's overflow.
const valuePop = (() => {
  const el = document.createElement('div');
  el.className = 'value-pop';
  document.body.appendChild(el);
  return {
    show(text, clientX, clientY) {
      el.textContent = text;
      el.style.left = (clientX + 12) + 'px';
      el.style.top  = (clientY - 8)  + 'px';
      el.style.display = 'block';
    },
    update(text) { el.textContent = text; },
    hide() { el.style.display = 'none'; },
  };
})();

// ─── Status pill (0046, repositioned in 0049) ──────────────────────────────
//
// Inline chip in the preset bar, right of the current preset name. The
// markup lives in faceplate.html so the bar layout is one HTML edit, not
// JS-built; this IIFE just binds and exposes a `.flash(text)` API.
// `Status { line }` ViewEvents flash for ~3s then fade (CSS transition).
// Re-fired messages reset the timer so a rapid burst stays readable.
const statusPill = (() => {
  const el = document.getElementById('pbar-status');
  let timer = null;
  return {
    flash(text) {
      if (!el) return;
      el.textContent = text;
      el.classList.add('visible');
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => el.classList.remove('visible'), 3000);
    },
  };
})();

// ─── Preset browser panel (0050 / 0051) ────────────────────────────────────
//
// Floating two-pane folders/presets browser anchored under the preset bar.
// Corpus snapshot arrives via `__vxn.applyPresetCorpus(snapshot)` — Rust
// pushes a fresh one at first flush and on every `PresetCorpusChanged`
// (`vxn_ui_web::EditorHandle::flush_view_events`). Folder selection +
// search are pure view state. Loading a preset posts `load_factory` or
// `load_user` UiEvents; the controller publishes a `preset_loaded` back
// which feeds the highlight in `setCurrentSource`.
//
// 0051 adds the user-side mutation flows: right-click context menu on
// user rows (Rename / Delete / Move to ▸ for presets; Rename / Delete
// for folders), an inline "+ New" button on the user header, and a
// modal "Delete X?" confirm for the irreversible op (the Vizia version's
// two-click row-armed pattern was unreadable here — the right-click menu
// obscured the row text).
const browserPanel = (() => {
  const panelEl    = document.getElementById('browser-panel');
  const backdropEl = document.getElementById('browser-backdrop');
  const foldersEl  = document.getElementById('browser-folders');
  const presetsEl  = document.getElementById('browser-presets');
  const inputEl    = document.getElementById('browser-search-input');
  const clearEl    = document.getElementById('browser-search-clear');
  const closeEl    = document.getElementById('browser-close');

  // Default selection: user root (so Save As targets the user dir on first
  // open before the user has chosen a folder explicitly).
  let corpus = { factory: [], user: [] };
  let selectedFolder = { kind: 'user', name: null };
  let query = '';
  let currentSource = null;
  let isOpen = false;
  let onOpenChange = null;

  // 0051: single open menu at a time + at most one modal confirm.
  let menuEl = null;
  let modalEl = null;

  // Match the Vizia browser's section labels (vxn_ui_vizia `browser-section`).
  const FACTORY_HEADER = 'FACTORY';
  const USER_HEADER    = 'USER';
  const UNCATEGORISED  = 'Uncategorised';

  function setCorpus(snap) {
    corpus = snap || { factory: [], user: [] };
    if (!folderExists(selectedFolder)) {
      selectedFolder = { kind: 'user', name: null };
    }
    // Any in-flight menu / modal from before the corpus changed is
    // stale — the target row may have been renamed / moved / deleted.
    closeMenu();
    closeModal();
    renderFolders();
    renderPresets();
  }
  function folderExists(key) {
    if (!key) return false;
    const list = key.kind === 'factory' ? corpus.factory : corpus.user;
    if (!Array.isArray(list)) return false;
    for (const g of list) {
      const gn = key.kind === 'factory' ? g.category : g.name;
      if (gn === key.name || (gn == null && key.name == null)) return true;
    }
    return false;
  }
  function folderLabel(key, group) {
    if (key.kind === 'factory') return group.category || UNCATEGORISED;
    return group.name || UNCATEGORISED;
  }
  function renderFolders() {
    foldersEl.innerHTML = '';
    appendSection(FACTORY_HEADER, null);
    for (const g of corpus.factory) {
      appendFolderRow({ kind: 'factory', name: g.category }, folderLabel({kind:'factory'}, g));
    }
    appendSection(USER_HEADER, () => {
      window.vxn.promptText('New folder', 'New Folder', (value) => {
        if (value == null) return;
        const trimmed = value.trim();
        if (!trimmed) return;
        window.vxn.send({ op: 'new_folder', suggested: trimmed });
      });
    });
    for (const g of corpus.user) {
      appendFolderRow({ kind: 'user', name: g.name }, folderLabel({kind:'user'}, g));
    }
  }
  function appendSection(text, onNewFolder) {
    if (onNewFolder) {
      const row = document.createElement('div');
      row.className = 'browser-section-row';
      const h = document.createElement('div');
      h.className = 'browser-section';
      h.textContent = text;
      row.appendChild(h);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'browser-new-folder';
      btn.textContent = '+ New';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeMenu();
        onNewFolder();
      });
      row.appendChild(btn);
      foldersEl.appendChild(row);
    } else {
      const h = document.createElement('div');
      h.className = 'browser-section';
      h.textContent = text;
      foldersEl.appendChild(h);
    }
  }
  function appendFolderRow(key, label) {
    const r = document.createElement('div');
    r.className = 'browser-row';
    r.textContent = label;
    if (selectedFolder.kind === key.kind && selectedFolder.name === key.name) {
      r.classList.add('selected');
    }
    r.addEventListener('click', () => {
      selectedFolder = key;
      closeMenu();
      renderFolders();
      renderPresets();
    });
    // Only user folders carry a context menu. Factory rows are read-only.
    // The virtual user-root entry (`name == null`) can't be renamed or
    // deleted either (it represents the user preset dir itself).
    if (key.kind === 'user' && key.name != null) {
      r.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        openMenu(e, { kind: 'folder', name: key.name });
      });
    }
    foldersEl.appendChild(r);
  }
  function findGroup() {
    const list = selectedFolder.kind === 'factory' ? corpus.factory : corpus.user;
    for (const g of list) {
      const gn = selectedFolder.kind === 'factory' ? g.category : g.name;
      if (gn === selectedFolder.name) return g;
    }
    return null;
  }
  function renderPresets() {
    presetsEl.innerHTML = '';
    const q = query.trim().toLowerCase();
    // Search mode: query spans the whole corpus, ignoring the folder
    // selection. The right pane becomes a flat list of matches with an
    // origin label per row so cross-folder duplicates stay readable.
    if (q) {
      const hits = collectSearchHits(q);
      if (hits.length === 0) { appendEmpty('No matches'); return; }
      for (const h of hits) appendSearchRow(h);
      return;
    }
    // No query: browse the selected folder normally.
    const group = findGroup();
    if (!group) { appendEmpty('No presets'); return; }
    for (const p of group.presets) {
      const r = document.createElement('div');
      r.className = 'browser-row';
      r.textContent = p.name;
      if (isCurrent(p)) r.classList.add('current');
      r.addEventListener('click', () => {
        closeMenu();
        loadEntry(p);
      });
      // Only user-side presets get a context menu. Factory is read-only.
      if (selectedFolder.kind === 'user') {
        r.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          openMenu(e, { kind: 'preset', path: p.path, name: p.name, folder: selectedFolder.name });
        });
      }
      presetsEl.appendChild(r);
    }
    if (!group.presets.length) appendEmpty('No presets');
  }
  // Flat search across factory + user. Returns `{name, source, origin}`
  // tuples in factory-then-user order, alpha-by-name within each origin
  // (same order corpus_snapshot_json ships).
  function collectSearchHits(q) {
    const out = [];
    for (const g of corpus.factory) {
      const cat = g.category || UNCATEGORISED;
      for (const p of g.presets) {
        if (!p.name.toLowerCase().includes(q)) continue;
        out.push({
          name: p.name,
          source: { kind: 'factory', index: p.index },
          origin: 'Factory · ' + cat,
        });
      }
    }
    for (const g of corpus.user) {
      const folder = g.name || UNCATEGORISED;
      for (const p of g.presets) {
        if (!p.name.toLowerCase().includes(q)) continue;
        out.push({
          name: p.name,
          source: { kind: 'user', path: p.path, folder: g.name },
          origin: 'User · ' + folder,
        });
      }
    }
    return out;
  }
  function appendSearchRow(h) {
    const r = document.createElement('div');
    r.className = 'browser-row search-row';
    const name = document.createElement('span');
    name.className = 'browser-row-name';
    name.textContent = h.name;
    const origin = document.createElement('span');
    origin.className = 'browser-row-origin';
    origin.textContent = h.origin;
    r.appendChild(name);
    r.appendChild(origin);
    if (isCurrentSource(h.source)) r.classList.add('current');
    r.addEventListener('click', () => {
      closeMenu();
      if (h.source.kind === 'factory') {
        window.vxn.send({ op: 'load_factory', index: h.source.index });
      } else {
        window.vxn.send({ op: 'load_user', path: h.source.path });
      }
    });
    // User-side search hits keep their context menu (Rename / Delete /
    // Move to), referencing the hit's own folder so Move-to's submenu
    // excludes the right one.
    if (h.source.kind === 'user') {
      r.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        openMenu(e, {
          kind: 'preset',
          path: h.source.path,
          name: h.name,
          folder: h.source.folder,
        });
      });
    }
    presetsEl.appendChild(r);
  }
  function isCurrentSource(src) {
    if (!currentSource || !src) return false;
    if (src.kind === 'factory') {
      return currentSource.kind === 'factory' && currentSource.index === src.index;
    }
    return currentSource.kind === 'user' && currentSource.path === src.path;
  }
  function appendEmpty(text) {
    const e = document.createElement('div');
    e.className = 'browser-empty';
    e.textContent = text;
    presetsEl.appendChild(e);
  }
  function isCurrent(p) {
    if (!currentSource) return false;
    if (selectedFolder.kind === 'factory') {
      return currentSource.kind === 'factory' && currentSource.index === p.index;
    }
    return currentSource.kind === 'user' && currentSource.path === p.path;
  }
  function loadEntry(p) {
    if (selectedFolder.kind === 'factory') {
      window.vxn.send({ op: 'load_factory', index: p.index });
    } else {
      window.vxn.send({ op: 'load_user', path: p.path });
    }
  }
  function setOpen(open) {
    isOpen = !!open;
    panelEl.hidden = !isOpen;
    backdropEl.hidden = !isOpen;
    window.vxn._browserOpen = isOpen;
    if (isOpen) {
      renderFolders();
      renderPresets();
      try { inputEl.focus(); } catch (_) {}
    } else {
      closeMenu();
      closeModal();
    }
    if (onOpenChange) onOpenChange(isOpen);
  }
  function setCurrentSource(src) {
    currentSource = src || null;
    if (isOpen) renderPresets();
  }
  function getSaveFolder() {
    if (selectedFolder.kind !== 'user') return null;
    return selectedFolder.name;
  }

  // ── Context menu (0051) ──────────────────────────────────────────────
  //
  // Menu is a child of the browser panel so it inherits the panel's
  // clipping; coordinates are relative to the panel. Outside-click and
  // ESC both close it (panel ESC handler closes the whole panel after
  // closing any open menu first, so ESC is "close one level").
  function closeMenu() {
    if (menuEl) {
      menuEl.remove();
      menuEl = null;
    }
  }
  function openMenu(ev, target) {
    closeMenu();
    const m = document.createElement('div');
    m.className = 'browser-menu';
    // Position relative to the panel — convert client coords into panel-
    // local coords using the panel's bounding box.
    const rect = panelEl.getBoundingClientRect();
    m.style.left = (ev.clientX - rect.left) + 'px';
    m.style.top  = (ev.clientY - rect.top)  + 'px';

    // Rename — both targets use the same op shape internals; preset takes
    // `path`, folder takes `old_name`.
    const renameLabel = target.kind === 'preset' ? target.name : target.name;
    appendMenuItem(m, 'Rename', () => {
      closeMenu();
      window.vxn.promptText('Rename', renameLabel, (value) => {
        if (value == null) return;
        const trimmed = value.trim();
        if (!trimmed || trimmed === renameLabel) return;
        if (target.kind === 'preset') {
          window.vxn.send({ op: 'rename_preset', path: target.path, new_name: trimmed });
        } else {
          window.vxn.send({ op: 'rename_folder', old_name: target.name, new_name: trimmed });
        }
      });
    });
    // Delete — modal confirm. The menu closes first so the row text
    // isn't obscured behind the menu while the user reads the prompt.
    appendMenuItem(m, 'Delete', () => {
      closeMenu();
      openDeleteConfirm(target);
    });
    // Move to ▸ — preset only. Submenu lists user folders except the
    // current one; CSS shows the submenu on hover.
    if (target.kind === 'preset') {
      appendMoveSubmenu(m, target);
    }
    panelEl.appendChild(m);
    menuEl = m;
  }
  function appendMenuItem(parent, label, onClick) {
    const item = document.createElement('div');
    item.className = 'browser-menu-item';
    item.textContent = label;
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      onClick();
    });
    parent.appendChild(item);
    return item;
  }
  function appendMoveSubmenu(parent, target) {
    const item = document.createElement('div');
    item.className = 'browser-menu-item has-submenu';
    item.textContent = 'Move to';
    const sub = document.createElement('div');
    sub.className = 'browser-submenu';
    const targets = moveTargets(target.folder);
    if (targets.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'browser-submenu-empty';
      empty.textContent = 'no other folders';
      sub.appendChild(empty);
    } else {
      for (const t of targets) {
        const subItem = document.createElement('div');
        subItem.className = 'browser-submenu-item';
        subItem.textContent = t.label;
        subItem.addEventListener('click', (e) => {
          e.stopPropagation();
          closeMenu();
          window.vxn.send({ op: 'move_preset', path: target.path, dest_folder: t.name });
        });
        sub.appendChild(subItem);
      }
    }
    item.appendChild(sub);
    parent.appendChild(item);
    return item;
  }
  // Move targets order matches the left-pane order: Uncategorised first
  // (the virtual user-root, `name: null`), then alpha-sorted named user
  // folders. The current folder is suppressed (moving to the current
  // folder is a no-op). Mirrors `vxn_ui_vizia::move_targets`.
  function moveTargets(currentName) {
    const out = [];
    let hasRoot = false;
    const named = [];
    for (const g of corpus.user) {
      if (g.name == null) { hasRoot = true; continue; }
      named.push(g.name);
    }
    named.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    if (hasRoot && currentName !== null) {
      out.push({ name: null, label: UNCATEGORISED });
    }
    for (const n of named) {
      if (n === currentName) continue;
      out.push({ name: n, label: n });
    }
    return out;
  }

  // ── Modal confirm (0051) ─────────────────────────────────────────────
  //
  // Click Delete in the context menu → menu closes → modal opens, centred
  // inside the browser panel. Cancel / Esc dismisses; Delete posts the
  // corresponding UiEvent. Backdrop click cancels too.
  function openDeleteConfirm(target) {
    const isPreset = target.kind === 'preset';
    const kindLabel = isPreset ? 'preset' : 'folder';
    const name = isPreset ? target.name : target.name;
    const message = isPreset
      ? `Delete preset “${name}”? This cannot be undone.`
      : `Delete folder “${name}” and every preset inside it? This cannot be undone.`;
    openModal({
      title: `Delete ${kindLabel}`,
      body: message,
      confirmLabel: 'Delete',
      danger: true,
      onConfirm: () => {
        if (isPreset) {
          window.vxn.send({ op: 'delete_preset', path: target.path });
        } else {
          window.vxn.send({ op: 'delete_folder', name: target.name });
        }
      },
    });
  }
  function closeModal() {
    if (modalEl) {
      modalEl.remove();
      modalEl = null;
    }
  }
  // `body` is either a string (rendered as plain text) or a callback
  // `(host) => void` that mounts its own elements into `host`. The
  // callback form is what the Save As modal uses to host its name +
  // folder controls. `extendActions` is an optional callback that gets
  // the actions row plus a `setEnabled(bool)` hook for the OK button —
  // useful for forms that need to gate Save until the input is valid.
  function openModal({ title, body, confirmLabel, danger, onConfirm, extendActions }) {
    closeModal();
    closeMenu();
    const wrap = document.createElement('div');
    wrap.className = 'browser-modal-wrap';

    const back = document.createElement('div');
    back.className = 'browser-modal-backdrop';
    back.addEventListener('click', closeModal);
    wrap.appendChild(back);

    const dialog = document.createElement('div');
    dialog.className = 'browser-modal';

    const t = document.createElement('div');
    t.className = 'browser-modal-title';
    t.textContent = title;
    dialog.appendChild(t);

    const b = document.createElement('div');
    b.className = 'browser-modal-body';
    if (typeof body === 'function') body(b);
    else b.textContent = body;
    dialog.appendChild(b);

    const actions = document.createElement('div');
    actions.className = 'browser-modal-actions';
    const cancel = document.createElement('button');
    cancel.type = 'button';
    cancel.className = 'browser-modal-btn';
    cancel.textContent = 'Cancel';
    cancel.addEventListener('click', closeModal);
    actions.appendChild(cancel);

    const ok = document.createElement('button');
    ok.type = 'button';
    ok.className = 'browser-modal-btn' + (danger ? ' danger' : '');
    ok.textContent = confirmLabel || 'OK';
    ok.addEventListener('click', () => {
      if (ok.disabled) return;
      try { onConfirm(); } catch (e) { console.warn('modal onConfirm threw', e); }
      closeModal();
    });
    actions.appendChild(ok);
    if (extendActions) {
      extendActions({ setEnabled: (on) => { ok.disabled = !on; ok.classList.toggle('disabled', !on); } });
    }
    dialog.appendChild(actions);
    wrap.appendChild(dialog);

    // Anchor over the whole faceplate, not just the browser panel — so
    // Save As works whether the panel is open or not.
    document.getElementById('faceplate').appendChild(wrap);
    modalEl = wrap;
    try { ok.focus(); } catch (_) {}
  }

  // ── Save As modal (0049 / 0051) ──────────────────────────────────────
  //
  // Single dialog with a name field + folder dropdown. The name field is
  // captured via the existing native popup (`promptText`) so Space + other
  // transport-mapped keys aren't swallowed by the host's NSEvent monitor;
  // the dropdown is a plain `<select>` (mouse-driven select uses WKWebView's
  // native popup menu — no key capture concerns). Save posts
  // `save_preset { name, folder }`.
  function openSaveAsModal(initialName) {
    let name = (initialName || '').trim();
    // Default folder selection: whichever folder the user has chosen in
    // the browser panel (user side only); factory selections collapse to
    // root, matching `getSaveFolder`.
    const initialFolder = (selectedFolder.kind === 'user') ? selectedFolder.name : null;
    let folder = initialFolder;
    let setEnabledHook = null;
    let nameLabel = null;

    function valid() { return name.length > 0; }
    function refreshEnabled() {
      if (setEnabledHook) setEnabledHook(valid());
    }

    openModal({
      title: 'Save preset as',
      body: (host) => {
        host.classList.add('save-as-body');

        // Name row: read-only-looking label + Edit button that funnels
        // through the native popup. Updates `name` and the label on commit.
        const nameRow = document.createElement('div');
        nameRow.className = 'save-as-row';
        const nameLab = document.createElement('div');
        nameLab.className = 'save-as-label';
        nameLab.textContent = 'Name';
        nameRow.appendChild(nameLab);
        nameLabel = document.createElement('div');
        nameLabel.className = 'save-as-name';
        nameLabel.textContent = name || '(untitled)';
        if (!name) nameLabel.classList.add('placeholder');
        nameRow.appendChild(nameLabel);
        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'browser-modal-btn';
        editBtn.textContent = name ? 'Edit' : 'Name…';
        editBtn.addEventListener('click', () => {
          window.vxn.promptText('Preset name', name, (value) => {
            if (value == null) return;
            const trimmed = value.trim();
            if (!trimmed) return;
            name = trimmed;
            nameLabel.textContent = name;
            nameLabel.classList.remove('placeholder');
            editBtn.textContent = 'Edit';
            refreshEnabled();
          });
        });
        nameRow.appendChild(editBtn);
        host.appendChild(nameRow);

        // Folder row: dropdown over user folders. Null = root
        // (Uncategorised); named folders sorted alpha. Mirrors the left-
        // pane order so the choices read the same.
        const folderRow = document.createElement('div');
        folderRow.className = 'save-as-row';
        const folderLab = document.createElement('div');
        folderLab.className = 'save-as-label';
        folderLab.textContent = 'Folder';
        folderRow.appendChild(folderLab);
        const select = document.createElement('select');
        select.className = 'save-as-select';
        for (const opt of folderOptions()) {
          const o = document.createElement('option');
          o.value = opt.value;
          o.textContent = opt.label;
          if (opt.value === folderValue(folder)) o.selected = true;
          select.appendChild(o);
        }
        select.addEventListener('change', () => {
          folder = (select.value === '__root__') ? null : select.value;
        });
        folderRow.appendChild(select);
        host.appendChild(folderRow);
      },
      confirmLabel: 'Save',
      onConfirm: () => {
        if (!valid()) return;
        window.vxn.send({ op: 'save_preset', name, folder });
      },
      extendActions: ({ setEnabled }) => {
        setEnabledHook = setEnabled;
        setEnabled(valid());
      },
    });
  }
  function folderValue(name) {
    return name == null ? '__root__' : name;
  }
  function folderOptions() {
    const named = [];
    let hasRoot = false;
    for (const g of corpus.user) {
      if (g.name == null) { hasRoot = true; continue; }
      named.push(g.name);
    }
    named.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    const out = [];
    // Always offer the root, even if the snapshot didn't include the
    // virtual folder yet (corpus seeds it lazily on first save).
    out.push({ value: '__root__', label: UNCATEGORISED });
    for (const n of named) out.push({ value: n, label: n });
    return out;
  }

  inputEl.addEventListener('input', () => {
    query = inputEl.value || '';
    renderPresets();
  });
  clearEl.addEventListener('click', () => {
    inputEl.value = '';
    query = '';
    renderPresets();
    inputEl.focus();
  });
  backdropEl.addEventListener('click', () => setOpen(false));
  closeEl.addEventListener('click', (e) => {
    e.stopPropagation();
    setOpen(false);
  });
  // Click anywhere inside the panel that isn't the menu closes the menu
  // (matches the Vizia browser's overlay click-out).
  panelEl.addEventListener('click', (e) => {
    if (menuEl && !menuEl.contains(e.target)) closeMenu();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    if (!isOpen) return;
    e.preventDefault();
    // ESC closes one level: open modal → menu → panel.
    if (modalEl) { closeModal(); return; }
    if (menuEl)  { closeMenu();  return; }
    setOpen(false);
  });

  return {
    setCorpus,
    setCurrentSource,
    setOpen,
    isOpen: () => isOpen,
    getSaveFolder,
    openSaveAs: openSaveAsModal,
    onOpenChange: (cb) => { onOpenChange = cb; },
    // Exposed for in-page tests.
    _moveTargets: moveTargets,
  };
})();
// Replace the bootstrap stub so future Rust pushes go straight to the
// panel; drain any snapshot that arrived during bootstrap.
window.__vxn.applyPresetCorpus = (snap) => browserPanel.setCorpus(snap);
if (_earlyPresetCorpus) {
  browserPanel.setCorpus(_earlyPresetCorpus);
  _earlyPresetCorpus = null;
}

// ─── Preset bar wiring (0049 / 0050) ───────────────────────────────────────
//
// Prev/next post `step_preset` with a signed delta — the controller walks
// the combined Factory + User list and emits a fresh `preset_loaded` for
// us to pick up. The current name comes from the same `preset_loaded`
// dispatch branch in `init()`. Browse toggles the 0050 browser panel
// (open/close mirrored back via the panel's `onOpenChange` so the button's
// `.active` class stays in sync with click-outside / ESC dismissals).
// Save As opens the 0048 popup and on commit posts `save_preset` using
// the browser panel's currently-selected user folder as the destination
// (factory selections collapse to user root — there's no write target
// inside the factory bank).
const presetBar = (() => {
  const nameEl   = document.getElementById('pbar-name');
  const prevEl   = document.getElementById('pbar-prev');
  const nextEl   = document.getElementById('pbar-next');
  const browseEl = document.getElementById('pbar-browse');
  const saveEl   = document.getElementById('pbar-save');
  let currentName = '';

  function setName(name) {
    currentName = name || '';
    if (nameEl) nameEl.textContent = currentName;
  }
  if (prevEl) {
    prevEl.addEventListener('click', () => window.vxn.send({ op: 'step_preset', delta: -1 }));
  }
  if (nextEl) {
    nextEl.addEventListener('click', () => window.vxn.send({ op: 'step_preset', delta: 1 }));
  }
  if (browseEl) {
    browseEl.addEventListener('click', () => browserPanel.setOpen(!browserPanel.isOpen()));
  }
  browserPanel.onOpenChange((open) => {
    if (browseEl) browseEl.classList.toggle('active', open);
  });
  if (saveEl) {
    // Save As opens the combined name + folder modal. The name field
    // funnels through the existing native popup (`promptText`) for
    // spacebar-safe entry; the folder dropdown is mouse-driven (no kbd
    // capture concern). The modal anchors over the faceplate, so it
    // works whether or not the browser panel itself is open.
    saveEl.addEventListener('click', () => browserPanel.openSaveAs(currentName));
  }
  return { setName };
})();

// ─── Waveform glyph polylines ──────────────────────────────────────────────
//
// In a [0, 1]² box (y down). Ported from `wave_points` in
// vxn-ui-vizia/src/lib.rs — coordinates only, no SVG-specific tweaks.
const WAVE_GLYPHS = {
  'Sine': (() => {
    const pts = [];
    for (let k = 0; k <= 16; k++) {
      const t = k / 16;
      pts.push([t, 0.5 - 0.38 * Math.sin(t * Math.PI * 2)]);
    }
    return pts;
  })(),
  'Triangle': [[0, 0.85], [0.5, 0.15], [1, 0.85]],
  'Tri':      [[0, 0.85], [0.5, 0.15], [1, 0.85]],
  'Saw':      [[0, 0.85], [0.5, 0.15], [0.5, 0.85], [1, 0.15]],
  'Saw+':     [[0, 0.85], [0.5, 0.15], [0.5, 0.85], [1, 0.15]],
  'Saw-':     [[0, 0.15], [0.5, 0.85], [0.5, 0.15], [1, 0.85]],
  'Pulse':    [[0, 0.85], [0, 0.15], [0.5, 0.15], [0.5, 0.85], [1, 0.85]],
  'Square':   [[0, 0.85], [0, 0.15], [0.5, 0.15], [0.5, 0.85], [1, 0.85]],
  'S&H':      [[0, 0.6], [0.28, 0.6], [0.28, 0.2], [0.56, 0.2], [0.56, 0.8], [0.82, 0.8], [0.82, 0.45], [1, 0.45]],
};

function glyphPath(label, w, h) {
  const pts = WAVE_GLYPHS[label];
  if (!pts) return null;
  return pts.map((p, i) =>
    (i === 0 ? 'M' : 'L') + (p[0] * w).toFixed(2) + ' ' + (p[1] * h).toFixed(2)
  ).join(' ');
}

// ─── Control primitives ────────────────────────────────────────────────────

// Per-control state, indexed by CLAP id. Each entry is an array — most ids
// have one updater (the cell that owns the param), but composite cells
// (detune-legato) register secondary watchers on related ids (e.g. the
// Voice panel's detune-legato watches assign_mode alongside the dedicated
// AssignMode buttongroup cell). Dispatch fans the ParamChanged out to
// every updater on the id.
const CONTROLS = new Map();
function addCtl(id, ctl) {
  let arr = CONTROLS.get(id);
  if (!arr) CONTROLS.set(id, arr = []);
  arr.push(ctl);
}

// Last (plain, norm, display) seen per param, indexed by CLAP id. Used by
// the sync-partner refresh path: when an LFO rate's sync flips, we re-run
// the rate's `update` with its cached value so the displayed label flips
// between Hz and a subdivision (0042). Also lets the Free-run dim quirk
// read the toggle's current state without subscribing to the model.
const LAST_PARAM = new Map();

// Map a rate-fader CLAP id to its sync-toggle CLAP id (and vice versa).
// Built in `init()` from descriptor names so a CLAP-id reshuffle in the
// `PatchParam` table doesn't desync the pairing. `Lfo1 rate ↔ Lfo1 sync`
// is per-layer (currently Upper only — 0045 lands the layer toggle);
// `Lfo2 rate ↔ Lfo2 sync` is global.
const SYNC_OF_RATE = new Map();  // rateId -> syncId
const RATE_OF_SYNC = new Map();  // syncId -> rateId

// `lfo1_free_run` and the cells it dims. The Free toggle disables the
// LFO's delay/fade onset (engine behaviour); the editor mirrors it as a
// visual dim (ticket 0042: "visual feedback only … no client-side state
// machine"). Looked up once in `init()`.
let FREE_RUN_ID = null;
const FREE_DIMMED_CELLS = [];  // [{ id, el }]

// `filter_mode` ↔ Slope dim (0043). The DSP's `FilterMode::mix` ignores
// `FilterSlope` when the mode is Notch (the 2-pole notch is structurally
// the cleanest null the ladder can form — see vxn-dsp/src/ota_ladder.rs),
// so the strip switch dims in that mode to signal it's a no-op. The Notch
// variant index is resolved at init from the descriptor's `variants`
// array so a label reorder in `FILTER_MODE_LABELS` doesn't desync.
let FILTER_MODE_ID = null;
let FILTER_NOTCH_INDEX = -1;
const SLOPE_DIMMED_CELLS = [];  // [el]

// One detent = one variant step. The drag sensitivity: pixels of vertical
